<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback Hub | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=23">
    <style>
        body { background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; }
        .dashboard-container { max-width: 1000px; margin: 50px auto; padding: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-card); padding: 2rem; border-radius: 24px; border: 1px solid var(--border-color); text-align: center; }
        .stat-value { font-size: 3.5rem; font-family: 'Outfit'; font-weight: 800; color: var(--peach-accent); line-height: 1; margin-bottom: 0.5rem; }
        .stat-label { color: var(--text-muted); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; font-weight: 600; }
        .feedback-list { display: flex; flex-direction: column; gap: 1rem; }
        .feedback-item { background: var(--bg-card); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border-color); }
        .feedback-item .rating { font-weight: bold; color: var(--neon-accent); margin-bottom: 0.5rem; font-size: 1.1rem; }
        .feedback-item .run-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px; }
        .feedback-item .comment { font-size: 1.05rem; line-height: 1.4; color: #ddd; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1 style="font-family:'Outfit'; font-size:2.5rem; margin-bottom:0.5rem;">Feedback Hub</h1>
        <p style="color:var(--text-muted); margin-bottom:2rem;"><a href="admin.html" style="color:var(--neon-accent); text-decoration:none;">&larr; Back to Admin</a> &nbsp;|&nbsp; Community sentiment and survey results.</p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="avgRating">--</div>
                <div class="stat-label">Avg Effort (1-10)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalFeedback" style="color: var(--neon-accent);">0</div>
                <div class="stat-label">Total Responses</div>
            </div>
        </div>

        <h2 style="font-family:'Outfit'; margin-bottom:1.5rem; font-size:1.8rem;">Recent Feedback</h2>
        <div class="feedback-list" id="feedbackList">
            <p style="color:var(--text-muted);">Loading feedback...</p>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://qcqyyfnsfyuaaaacddsm.supabase.co';
        const supabaseKey = 'sb_publishable_uXs2e5aPzrIL_M2xsYDmWg_hPOUaG1l';

        async function loadFeedback() {
            try {
                const res = await fetch(`${supabaseUrl}/rest/v1/stride_surveys?order=created_at.desc`, {
                    headers: { 'apikey': supabaseKey, 'Authorization': `Bearer ${supabaseKey}` }
                });
                
                if(!res.ok) {
                    throw new Error("Failed to fetch from DB");
                }
                
                const surveys = await res.json();
                
                const list = document.getElementById('feedbackList');
                list.innerHTML = '';
                
                if(!surveys || surveys.length === 0) {
                    list.innerHTML = '<p style="color:var(--text-muted);">No feedback received yet. Next time people run, you will see it here!</p>';
                    return;
                }
                
                document.getElementById('totalFeedback').innerText = surveys.length;
                const avg = surveys.reduce((sum, s) => sum + s.rating, 0) / surveys.length;
                document.getElementById('avgRating').innerText = avg.toFixed(1);
                
                surveys.forEach(s => {
                    const el = document.createElement('div');
                    el.className = 'feedback-item animate-up';
                    const dateStr = new Date(s.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    
                    const ratingColor = s.rating >= 8 ? 'var(--neon-accent)' : (s.rating >= 5 ? '#f1c40f' : '#e74c3c');
                    
                    el.innerHTML = `
                        <div class="run-label">${s.run_label || 'General Feedback'} &nbsp;&bull;&nbsp; ${dateStr}</div>
                        <div class="rating" style="color: ${ratingColor};">EFFORT: ${s.rating} / 10</div>
                        <div class="comment">${s.feedback ? '"' + s.feedback + '"' : '<span style="color:var(--text-muted); font-style:italic;">No comment provided.</span>'}</div>
                    `;
                    list.appendChild(el);
                });
            } catch(e) {
                console.error(e);
                document.getElementById('feedbackList').innerHTML = '<p style="color:#e74c3c;">Failed to load data. Ensure your Supabase table is created.</p>';
            }
        }
        
        loadFeedback();
    </script>
</body>
</html>
