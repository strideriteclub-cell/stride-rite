<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=4">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js?v=2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Stride Rite</div>
    </nav>

    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div class="glass-panel" style="max-width: 420px; width: 100%; padding: 2.5rem; text-align: center;" id="resetPanel">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
            <h2 style="font-family: 'Outfit'; margin-bottom: 0.5rem;">Set New Password</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Choose a strong password for your Stride Rite account.</p>

            <div class="input-group" style="text-align: left;">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="At least 6 characters" minlength="6">
            </div>
            <div class="input-group" style="text-align: left;">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password">
            </div>

            <button class="btn btn-primary btn-block purple-bg" id="resetBtn" onclick="doReset()">
                🔑 Update Password
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qcqyyfnsfyuaaaacddsm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_uXs2e5aPzrIL_M2xsYDmWg_hPOUaG1l';
        const headers = {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
        };

        // Get token from URL
        const token = new URLSearchParams(window.location.search).get('token');

        // Validate token on load
        async function validateToken() {
            if (!token) {
                showError('Invalid link', 'This password reset link is invalid or missing.');
                return;
            }
            const res = await fetch(`${SUPABASE_URL}/rest/v1/password_resets?token=eq.${token}&used=eq.false&select=*`, { headers });
            const data = await res.json();
            if (!data || data.length === 0) {
                showError('Link Expired', 'This password reset link has already been used or expired.');
                return;
            }
            const record = data[0];
            if (new Date(record.expires_at) < new Date()) {
                showError('Link Expired', 'This link expired. Please request a new one.');
                return;
            }
            // Token is valid — panel already visible
        }

        function showError(title, text) {
            document.getElementById('resetPanel').innerHTML = `
                <div style="font-size:3rem; margin-bottom:1rem;">❌</div>
                <h2 style="font-family:'Outfit'; margin-bottom:0.5rem;">${title}</h2>
                <p style="color:var(--text-muted); margin-bottom:2rem;">${text}</p>
                <a href="index.html" class="btn btn-primary purple-bg" style="display:inline-block; padding:0.75rem 2rem;">Back to Login</a>
            `;
        }

        window.doReset = async function() {
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (newPass.length < 6) {
                Swal.fire({icon:'warning', title:'Password too short', text:'At least 6 characters required.', background:'#141419', color:'#fff'});
                return;
            }
            if (newPass !== confirm) {
                Swal.fire({icon:'error', title:"Passwords don't match", background:'#141419', color:'#fff'});
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.innerText = 'Updating...';
            btn.disabled = true;

            // Get email from token record
            const tokenRes = await fetch(`${SUPABASE_URL}/rest/v1/password_resets?token=eq.${token}&used=eq.false&select=email`, { headers });
            const tokenData = await tokenRes.json();
            if (!tokenData || tokenData.length === 0) {
                showError('Link Expired', 'This link has already been used.');
                return;
            }
            const email = tokenData[0].email;

            // Update password in stride_users
            await fetch(`${SUPABASE_URL}/rest/v1/stride_users?email=eq.${encodeURIComponent(email)}`, {
                method: 'PATCH',
                headers: { ...headers, 'Prefer': 'return=representation' },
                body: JSON.stringify({ password: newPass })
            });

            // Mark token as used
            await fetch(`${SUPABASE_URL}/rest/v1/password_resets?token=eq.${token}`, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({ used: true })
            });

            Swal.fire({
                icon: 'success',
                title: 'Password Updated! 🎉',
                text: 'You can now log in with your new password.',
                background: '#141419', color: '#fff',
                confirmButtonColor: 'var(--peach-accent)',
                confirmButtonText: 'Go to Login'
            }).then(() => window.location.href = 'index.html');
        };

        validateToken();
    </script>
</body>
</html>
