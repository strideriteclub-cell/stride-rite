      <stop offset="0%" style="stop-color:#1a1827"/>
      <stop offset="100%" style="stop-color:#0d0c11"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#584adc"/>
      <stop offset="100%" style="stop-color:#7c6ffa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
