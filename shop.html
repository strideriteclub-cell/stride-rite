<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Shop | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=21">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .hero-banner {
            background: linear-gradient(135deg, rgba(88,74,220,0.1), rgba(255,139,106,0.05));
            border: 1px solid var(--border-color);
            border-radius: 24px; padding: 4rem 2rem; text-align: center; margin-bottom: 3rem;
            margin-top: 1.5rem;
        }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .product-image { width: 100%; height: 280px; object-fit: cover; }
        .product-info { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
        .buy-btn { background: var(--peach-accent); color: black; border: none; padding: 1rem; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; margin-top: auto; }
        
        /* Checkout Modal Styles */
        .checkout-step { background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; text-align: left; }
        .method-selector { display: flex; gap: 0.5rem; margin: 10px 0; }
        .method-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: transparent; color: white; cursor: pointer; font-weight: 600; }
        .method-btn.selected { background: var(--neon-accent); border-color: var(--neon-accent); }
        .size-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 10px 0; }
        .size-btn { background: transparent; border: 1px solid var(--border-color); color: white; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
        .size-btn.selected { background: var(--peach-accent); border-color: var(--peach-accent); color: black; }
        .input-box { width: 100%; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid #333; color: white; margin-top: 8px; }
    </style>
</head>
<body>
    <div id="page-transition"></div>
    <nav class="navbar">
        <div style="font-family:'Outfit'; font-weight:800; font-size:1.5rem;">S<span style="color:var(--peach-accent);">.</span></div>
        <div class="nav-links">
            <a href="dashboard.html">📊 Board</a>
            <a href="gallery.html">📸 Gallery</a>
            <a href="#" onclick="AuthService.logout()">Logout</a>
        </div>
    </nav>

    <div class="shop-container animate-up">
        <div class="hero-banner">
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">Stride Rite Gear</h1>
            <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto;">Grab official community gear before it sells out.</p>
        </div>

        <div id="shopContent">
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </div>

    <script src="app.js?v=21"></script>
    <script>
        let selectedItem = null;
        let selectedSize = '';
        let selectedMethod = 'telda';

        async function loadShop() {
            const items = await AppService.getShopItems();
            const grid = document.getElementById('productsGrid');
            if(!items || items.length === 0) {
                grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:4rem; color:var(--text-muted);">Shop is currently closed for restocking.</p>`;
                return;
            }
            grid.innerHTML = items.map(item => `
                <div class="product-card">
                    <img src="${item.image_url}" class="product-image">
                    <div class="product-info">
                        <div style="font-weight:800; font-size:1.3rem; margin-bottom:0.5rem;">${item.name}</div>
                        <div style="color:var(--neon-accent); font-weight:700; margin-bottom:1.5rem;">${item.price} EGP</div>
                        <button class="buy-btn" onclick='openCheckout(${JSON.stringify(item)})'>Purchase Now</button>
                    </div>
                </div>`).join('');
        }

        window.openCheckout = function(item) {
            selectedItem = item;
            selectedSize = '';
            selectedMethod = 'telda';
            const sizes = (item.sizes || 'S,M,L,XL,XXL').split(',');
            const sizeHtml = sizes.map(s => `<button class="size-btn" onclick="selectSize(this, '${s.trim()}')">${s.trim()}</button>`).join('');

            Swal.fire({
                title: 'Complete Order',
                html: `
                    <div id="orderSummary" class="checkout-step" style="display:flex; align-items:center; gap:1.5rem; background:rgba(255,255,255,0.05); border:1px solid var(--neon-accent);">
                        <img src="${item.image_url}" style="width:80px; height:80px; object-fit:cover; border-radius:12px;">
                        <div style="text-align:left;">
                            <div style="font-weight:800; font-size:1.1rem; color:white;">${item.name}</div>
                            <div style="color:var(--neon-accent); font-weight:700;">${item.price} EGP</div>
                            <div id="summarySize" style="font-size:0.85rem; color:var(--peach-accent); font-weight:600; margin-top:4px;">Size: (Select below)</div>
                        </div>
                    </div>
                    <div class="checkout-step">
                        <div style="font-weight:700;">👕 Select Size:</div>
                        <div class="size-selector">${sizeHtml}</div>
                    </div>
                    <div class="checkout-step">
                        <div style="font-weight:700;">💳 Payment Method:</div>
                        <div class="method-selector">
                            <button class="method-btn selected" id="btnTelda" onclick="setMethod('telda')">Telda</button>
                            <button class="method-btn" id="btnInsta" onclick="setMethod('instapay')">InstaPay</button>
                        </div>
                        <div id="payInstruction" style="font-size:0.85rem; color:#a1a1aa; margin: 10px 0;">Pay to: <b>@ckh</b> on Telda</div>
                    </div>
                    <div class="checkout-step">
                        <div style="font-weight:700;">📋 Confirmation:</div>
                        <input type="tel" id="checkPhone" placeholder="WhatsApp Number" class="input-box">
                        <div id="dynamicInput">
                            <input type="text" id="checkDetail" placeholder="Telda Username" class="input-box">
                        </div>
                        <div id="photoArea" style="display:none; margin-top:10px;">
                            <div style="font-size:0.75rem; color:var(--peach-accent); margin-bottom:5px;">📷 Upload Transaction Receipt (Required):</div>
                            <input type="file" id="checkPhoto" accept="image/*" class="input-box" style="font-size:0.8rem;">
                        </div>
                    </div>
                `,
                background: '#141419', color: '#fff',
                showCancelButton: true, confirmButtonText: 'Submit Order', confirmButtonColor: 'var(--peach-accent)',
                preConfirm: () => {
                    const phone = document.getElementById('checkPhone').value.trim();
                    const detail = document.getElementById('checkDetail').value.trim();
                    const photo = document.getElementById('checkPhoto').files[0];
                    if(!selectedSize) return Swal.showValidationMessage('Select a size!');
                    if(!phone) return Swal.showValidationMessage('Phone required!');
                    if(!detail) return Swal.showValidationMessage(`${selectedMethod === 'telda' ? 'Username' : 'Phone'} required!`);
                    if(selectedMethod === 'instapay' && !photo) return Swal.showValidationMessage('Receipt photo required!');
                    return { phone, detail, photo };
                }
            }).then(async (res) => {
                if(res.isConfirmed) {
                    Swal.fire({ title: 'Submitting Order...', didOpen: () => Swal.showLoading(), background:'#141419', color:'#fff'});
                    const success = await AppService.submitOrder(item.id, selectedSize, res.value.phone, selectedMethod, res.value.detail, res.value.photo);
                    if(success) Swal.fire({ icon: 'success', title: 'Order Sent! 🎉', text: 'Admin will verify and notify you.', background: '#141419', color: '#fff' });
                    else Swal.fire({ icon: 'error', title: 'Submission failed', background: '#141419', color: '#fff' });
                }
            });
        };

        window.setMethod = (m) => {
            selectedMethod = m;
            document.getElementById('btnTelda').classList.toggle('selected', m === 'telda');
            document.getElementById('btnInsta').classList.toggle('selected', m === 'instapay');
            document.getElementById('payInstruction').innerHTML = m === 'telda' ? 'Pay to: <b>@ckh</b> on Telda' : 'Transfer to InstaPay Wallet: <b>01128828954</b>';
            document.getElementById('checkDetail').placeholder = m === 'telda' ? 'Telda Username' : 'InstaPay Phone Number';
            document.getElementById('photoArea').style.display = m === 'instapay' ? 'block' : 'none';
        };

        window.selectSize = (btn, size) => {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedSize = size;
            const sizeLabel = document.getElementById('summarySize');
            if(sizeLabel) sizeLabel.innerText = `Size: ${size}`;
        };

        loadShop();
    </script>
</body>
</html>
