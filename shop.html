<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=27">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .hero-banner {
            background: linear-gradient(135deg, rgba(88,74,220,0.1), rgba(255,139,106,0.05));
            border: 1px solid var(--border-color);
            border-radius: 24px; padding: 4rem 2rem; text-align: center; margin-bottom: 3rem;
            margin-top: 1.5rem;
        }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .product-card:hover { border-color: var(--neon-accent); transform: translateY(-4px); box-shadow: 0 10px 30px rgba(88,74,220,0.15); }
        .product-image { width: 100%; height: 280px; object-fit: cover; background: #0a0a0f; }
        .product-info { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
        .buy-btn { background: var(--peach-accent); color: black; border: none; padding: 1rem; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; margin-top: auto; transition: 0.2s; }
        .buy-btn:hover { filter: brightness(1.1); transform: scale(1.02); }
        .closed-state { text-align: center; padding: 5rem 1rem; }
        .closed-state h2 { font-size: 2.5rem; color: var(--peach-accent); margin-bottom: 1rem; font-family: 'Outfit', sans-serif; }
        .closed-state p { color: var(--text-muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto; }

        /* Checkout Modal */
        .checkout-step { background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; text-align: left; }
        .size-selector { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 10px 0; }
        .size-btn { background: transparent; border: 1px solid var(--border-color); color: white; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .size-btn.selected { background: var(--peach-accent); border-color: var(--peach-accent); color: black; }
        .input-box { width: 100%; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.3); border: 1px solid #333; color: white; margin-top: 8px; font-size: 1rem; box-sizing: border-box; }
        .admin-notice { background:rgba(255,0,0,0.15); border:1px solid rgba(255,80,80,0.5); color:white; padding:12px; text-align:center; border-radius:10px; margin-bottom:20px; font-size:0.85rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="font-family:'Outfit'; font-weight:800; font-size:1.5rem;">S<span style="color:var(--peach-accent);">.</span></div>
        <div class="nav-links">
            <a href="dashboard.html">📊 Board</a>
            <a href="gallery.html">📸 Gallery</a>
            <a href="#" onclick="AuthService.logout()">Logout</a>
        </div>
    </nav>

    <div class="shop-container animate-up" style="max-width:1200px; margin:0 auto; padding:2rem 1.5rem;">
        <div id="shopContent">
            <div style="text-align:center; padding:4rem;"><p style="color:var(--text-muted);">Loading Shop...</p></div>
        </div>
    </div>

    <script src="app.js?v=32"></script>
    <script>
        let selectedItem = null;
        let selectedSize = '';
        let selectedPaymentMethod = 'InstaPay';

        async function initShop() {
            const user = AuthService.getCurrentUser();
            if (!user) { window.location.href = 'index.html'; return; }

            const contentDiv = document.getElementById('shopContent');
            const isOpen = await AppService.getShopStatus();

            if (!isOpen && !user.is_admin) {
                contentDiv.innerHTML = `
                    <div class="closed-state">
                        <h2>🔒 The Shop is closed.</h2>
                        <p>We're brewing up fresh new merch for the community! Keep an eye on the WhatsApp group for the next drop announcement.</p>
                        <br><br>
                        <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
                    </div>`;
                return;
            }

            const items = await AppService.getShopItems();

            let adminBanner = '';
            if (user.is_admin && !isOpen) {
                adminBanner = `<div class="admin-notice">⚠️ Admin Notice: The shop is currently <strong>hidden</strong> from regular users. Toggle it on via the Telegram Bot → 🛍️ Shop Admin.</div>`;
            }

            if (!items || items.length === 0) {
                contentDiv.innerHTML = adminBanner + `
                    <div class="hero-banner">
                        <h1 style="font-size:3rem; margin-bottom:1rem;">Stride Rite Gear</h1>
                        <p style="color:var(--text-muted);">Grab official community gear before it sells out.</p>
                    </div>
                    <p style="text-align:center; color:var(--text-muted); padding:3rem;">No items currently in stock.</p>`;
                return;
            }

            const gridHtml = items.map(item => `
                <div class="product-card">
                    <img src="${item.image_url || 'https://via.placeholder.com/400x400/101015/ffffff?text=Merch'}" class="product-image" onerror="this.src='https://via.placeholder.com/400x400/101015/ffffff?text=Merch'">
                    <div class="product-info">
                        <div style="font-weight:800; font-size:1.3rem; margin-bottom:0.5rem;">${item.name}</div>
                        <div style="color:var(--neon-accent); font-weight:700; margin-bottom:1.5rem;">${item.price} EGP</div>
                        <button class="buy-btn" onclick='openCheckout(${JSON.stringify(item).replace(/'/g, "&apos;")})'>Purchase Now</button>
                    </div>
                </div>`).join('');

            contentDiv.innerHTML = adminBanner + `
                <div class="hero-banner">
                    <h1 style="font-size:3rem; margin-bottom:1rem;">Stride Rite Gear</h1>
                    <p style="color:var(--text-muted); max-width:600px; margin:0 auto;">Exclusive gear for the Al Rehab running community. Grab yours before it sells out.</p>
                </div>
                <div class="products-grid">${gridHtml}</div>`;
        }

        window.openCheckout = function(item) {
            selectedItem = item;
            selectedSize = '';
            const sizes = (item.sizes || 'S,M,L,XL,XXL').split(',').map(s => s.trim());
            const sizeHtml = sizes.map(s => `<button type="button" class="size-btn" onclick="selectSize(this, '${s}')">${s}</button>`).join('');

            Swal.fire({
                title: 'Confirm Your Order',
                html: `
                    <div style="text-align: left; background: #1a1a21; padding: 15px; border-radius: 12px; margin-bottom: 15px;">
                        <div style="display:flex; align-items:center; gap:1.5rem; background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; border:1px solid var(--neon-accent); margin-bottom:15px;">
                            <img src="${item.image_url}" style="width:60px; height:60px; object-fit:cover; border-radius:8px;" onerror="this.style.display='none'">
                            <div>
                                <div style="font-weight:800; font-size:1rem; color:white;">${item.name}</div>
                                <div style="color:var(--neon-accent); font-weight:700;">${item.price} EGP</div>
                                <div id="summarySize" style="font-size:0.75rem; color:var(--peach-accent); font-weight:600;">Size: (Select below)</div>
                            </div>
                        </div>

                        <p style="font-weight:700; margin-bottom:8px; color:#fff; font-size:0.9rem;">1. Select Size:</p>
                        <div class="size-selector">${sizeHtml}</div>

                        <p style="font-weight:700; margin-top:15px; margin-bottom:8px; color:#fff; font-size:0.9rem;">2. Payment Info:</p>
                        <div id="paymentInstructions" style="background:rgba(255,255,255,0.03); padding:1rem; border-radius:12px; border:1px solid rgba(255,255,255,0.1); margin-bottom:15px; text-align:center;">
                            <div style="display:flex; justify-content:center; align-items:center; gap:8px;">
                                <span id="paymentMethodIcon">🟣</span>
                                <span style="letter-spacing:1px; font-weight:800; font-size:0.8rem;" id="paymentMethodLabel">INSTAPAY:</span>
                                <code style="background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:6px; color:#fff; font-family:monospace; font-size:1rem;" id="paymentHandle">01128828954</code>
                            </div>
                        </div>

                        <p style="font-size: 0.85rem; color: #a1a1aa; margin-bottom: 10px;">3. Choose Your Method:</p>
                        <div class="payment-toggle" style="display: flex; gap: 10px; margin-bottom: 20px;">
                            <button type="button" onclick="setPaymentMethod('InstaPay')" id="btnInsta" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--peach-accent); background: var(--peach-accent); color: #000; font-weight: bold; cursor: pointer;">InstaPay</button>
                            <button type="button" onclick="setPaymentMethod('Telda')" id="btnTelda" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: transparent; color: #fff; cursor: pointer;">Telda</button>
                        </div>

                        <div id="paymentInputs">
                            <label id="refLabel" style="display: block; font-size: 0.8rem; color: #ff9e6d; margin-bottom: 5px;">InstaPay Number:</label>
                            <input id="checkRef" class="swal2-input" placeholder="Enter number..." style="width: 100%; margin: 0 0 15px 0; background: #000; color: #fff; border: 1px solid #333; font-size:0.9rem; height:40px;">
                        </div>

                        <label style="display: block; font-size: 0.8rem; color: #ff9e6d; margin-bottom: 5px;">WhatsApp Number:</label>
                        <input id="checkPhone" class="swal2-input" placeholder="01..." style="width: 100%; margin: 0 0 15px 0; background: #000; color: #fff; border: 1px solid #333; font-size:0.9rem; height:40px;">
                        
                        <div id="receiptContainer">
                            <label style="display: block; font-size: 0.8rem; color: #ff9e6d; margin-bottom: 5px;">Upload Proof (Screenshot):</label>
                            <input type="file" id="checkReceipt" accept="image/*" style="width: 100%; padding: 8px; background: #000; color: #fff; border: 1px dashed #444; border-radius: 8px; font-size:0.8rem;">
                        </div>
                    </div>`,
                background: '#141419',
                color: '#fff',
                showCancelButton: true,
                confirmButtonText: 'Submit Order',
                confirmButtonColor: 'var(--peach-accent)',
                width: '450px',
                preConfirm: () => {
                    const phone = document.getElementById('checkPhone').value.trim();
                    const ref = document.getElementById('checkRef').value.trim();
                    const receipt = document.getElementById('checkReceipt').files[0];
                    if (!selectedSize) return Swal.showValidationMessage('Please select a size!');
                    if (!phone || phone.length < 8) return Swal.showValidationMessage('Enter a valid phone number!');
                    if (!ref) return Swal.showValidationMessage(`Enter your ${selectedPaymentMethod} handle!`);
                    if (selectedPaymentMethod === 'InstaPay' && !receipt) return Swal.showValidationMessage('Please upload a screenshot of your transaction!');
                    return { phone, ref, receipt };
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'Submitting Order...', didOpen: () => Swal.showLoading(), background:'#141419', color:'#fff' });
                    const { phone, ref, receipt } = result.value;
                    const success = await AppService.submitOrder(selectedItem.id, selectedSize, ref, phone, selectedPaymentMethod, receipt);
                    if (success) {
                        Swal.fire({
                            icon: 'success',
                            title: 'Order Received! 🎉',
                            html: '<p>Our admins will verify your payment and email you a confirmation! See you at the next run!</p>',
                            background: '#141419', color: '#fff',
                            confirmButtonColor: 'var(--neon-accent)'
                        });
                    } else {
                        const errorMsg = window.lastDbError || 'Submission failed. Please try again.';
                        Swal.fire({
                            icon: 'error', 
                            title: 'Failed to submit', 
                            html: `<p style="font-size:0.9rem; color:#fca5a5;">Reason: ${errorMsg}</p>`,
                            background: '#141419', color: '#fff'
                        });
                    }
                }
            });
        };

        window.selectSize = function(btn, size) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedSize = size;
            const label = document.getElementById('summarySize');
            if (label) label.innerText = `Size: ${size}`;
        };

        window.setPaymentMethod = function(method) {
            selectedPaymentMethod = method;
            const bI = document.getElementById('btnInsta');
            const bT = document.getElementById('btnTelda');
            const label = document.getElementById('refLabel');
            
            const icon = document.getElementById('paymentMethodIcon');
            const pLabel = document.getElementById('paymentMethodLabel');
            const handle = document.getElementById('paymentHandle');
            const rcpt = document.getElementById('receiptContainer');
            
            if (method === 'InstaPay') {
                bI.style.background = 'var(--peach-accent)'; bI.style.color = '#000';
                bT.style.background = 'transparent'; bT.style.color = '#fff';
                label.innerText = 'InstaPay Number:';
                
                if (icon) icon.innerText = '🟣';
                if (pLabel) pLabel.innerText = 'INSTAPAY:';
                if (handle) handle.innerText = '01128828954';
                
                rcpt.style.display = 'block';
            } else {
                bT.style.background = 'var(--peach-accent)'; bT.style.color = '#000';
                bI.style.background = 'transparent'; bI.style.color = '#fff';
                label.innerText = 'Telda Username:';
                
                if (icon) icon.innerText = '🔴';
                if (pLabel) pLabel.innerText = 'TELDA:';
                if (handle) handle.innerText = '@ckh';
                
                rcpt.style.display = 'none';
            }
        };

        initShop();
    </script>
</body>
</html>
