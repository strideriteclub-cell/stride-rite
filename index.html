<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRIDE RITE | The Community for Every Pace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #0A0A0A; --card: #141414; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; margin: 0; }
        .hero { height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: linear-gradient(rgba(10,10,10,0.8), rgba(10,10,10,0.8)), url('https://images.unsplash.com/photo-1552674605-db6ffd4facb5?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); background-size: cover; }
        h1 { font-size: 5rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
        h1 span { color: var(--primary); }
        .btn-group { margin-top: 30px; display: flex; gap: 20px; }
        .btn { padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s; cursor: pointer; border: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid white; color: white; }
        .runs-section { padding: 80px 20px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .run-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .run-card h4 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.5rem; }
    </style>
</head>
<body>

<nav class="navbar" style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
    <div class="logo" style="font-weight: 900; font-size: 1.5rem;">STRIDE<span>RITE</span></div>
    <div class="nav-links" style="display: flex; gap: 30px;">
        <button onclick="window.location.href='index.html#runs'" class="btn" style="background:none; color:white;">Runs</button>
        <button id="login-toggle-btn" class="btn btn-outline" style="padding: 10px 25px;">Sign In</button>
    </div>
</nav>

<section class="hero">
    <h1>EVERY <span>PACE</span><br>IS WELCOME.</h1>
    <p style="font-size: 1.2rem; color: #888; max-width: 600px; margin-top: 20px;">Join the Stride Rite community. From first-time runners to elite athletes—we move as one.</p>
    <div class="btn-group">
        <button onclick="document.getElementById('runs').scrollIntoView()" class="btn btn-primary">Join a Run</button>
        <button id="open-gallery-btn" class="btn btn-outline">View Memories</button>
    </div>
</section>

<section id="runs" class="runs-section" style="display:none;" id="upcoming-runs-section">
    <h2 style="font-size: 2.5rem;">UPCOMING <span>MISSIONS</span></h2>
    <div class="grid" id="upcoming-runs-grid">
        <p style="color: #888;">Loading the streets...</p>
    </div>
</section>

<script src="app.js"></script>
</body>
</html>
