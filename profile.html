<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=12">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .profile-container { max-width: 900px; margin: 0 auto; padding: 2rem; margin-top: 100px; }
        .profile-header { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .avatar-circle { width: 100px; height: 100px; background: linear-gradient(135deg, var(--neon-accent), var(--peach-accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; color: white; box-shadow: 0 10px 30px rgba(88, 74, 220, 0.3); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 4rem; }
        .profile-stat-card { text-align: center; padding: 2.5rem 1rem; background: rgba(255,255,255,0.03); border-bottom: 4px solid var(--neon-accent); border-radius: 24px; border: 1px solid var(--border-color); }
        .stat-value { font-size: 3rem; font-weight: 800; font-family: 'Outfit'; line-height: 1; margin-bottom: 0.5rem; }
        .stat-label { color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: 600; }
        .history-title { font-family: 'Outfit'; font-size: 1.8rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; color: white; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <div style="font-family:'Outfit'; font-weight:800; font-size:1.5rem;">S<span style="color:var(--peach-accent);">.</span></div>
            <div style="font-family:'Outfit'; font-weight:800;" class="hidden-mobile">STRIDE RITE</div>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-icon-link"><span>📊</span><small>Dashboard</small></a>
            <a href="index.html" class="nav-icon-link"><span>🏠</span><small>Home</small></a>
        </div>
        <a href="#" onclick="AuthService.logout()" class="logout-link">Log Out</a>
    </nav>

    <div class="profile-container">
        <header class="profile-header animate-up">
            <div class="avatar-circle" id="userInitial">S</div>
            <div class="profile-info">
                <h1 id="userName">Runner Name</h1>
                <div style="margin-bottom: 1rem;"><span class="badge" id="userLevelBadge">Intermediate</span></div>
                <div style="color: var(--text-muted); font-size: 0.95rem;">📧 <span id="userEmail">email@example.com</span></div>
            </div>
        </header>

        <div class="stats-grid animate-up delay-1">
            <div class="profile-stat-card"><div class="stat-value" id="totalRuns">0</div><div class="stat-label">Total Runs</div></div>
            <div class="profile-stat-card"><div class="stat-value" id="totalKms">0.0</div><div class="stat-label">Total Kilometers</div></div>
            <div class="profile-stat-card"><div class="stat-value" id="avgDistance">0.0</div><div class="stat-label">Avg Range</div></div>
        </div>

        <section id="stravaSection" style="margin-top: 3rem; display: none;">
            <h2 class="history-title">🔥 Strava Feed</h2>
            <div class="b-grid" id="stravaContainer"></div>
        </section>

        <h2 class="history-title" style="margin-top: 3rem;">👟 Community Activity</h2>
        <div class="b-grid" id="historyContainer"></div>
    </div>

    <script src="app.js?v=21"></script>
    <script>
        const user = AuthService.getCurrentUser();
        if (!user) window.location.href = 'index.html';

        document.getElementById('userName').innerText = user.name;
        document.getElementById('userEmail').innerText = user.email;
        document.getElementById('userInitial').innerText = user.name.charAt(0).toUpperCase();
        document.getElementById('userLevelBadge').innerText = user.level || 'Beginner';

        async function loadProfile() {
            const stats = await AppService.getUserStats(user.id);
            document.getElementById('totalRuns').innerText = stats.totalRuns;
            document.getElementById('totalKms').innerText = stats.totalKms;
            document.getElementById('avgDistance').innerText = stats.totalRuns > 0 ? (stats.totalKms / stats.totalRuns).toFixed(1) : 0.0;

            const container = document.getElementById('historyContainer');
            if (!stats.pastRuns || stats.pastRuns.length === 0) {
                container.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:3rem; color: #a1a1aa;">No community runs registered yet.</p>`;
                return;
            }

            container.innerHTML = stats.pastRuns.map(run => `
                <div class="glass-card" style="padding:1.5rem;">
                    <div style="font-weight:800; font-size:1.2rem; color: white;">${run.date_display}</div>
                    <div style="color:var(--peach-accent); font-size:0.85rem; margin-bottom:1rem;">📍 ${run.location}</div>
                    <div style="display:flex; justify-content:space-between; border-top:1px solid rgba(255,255,255,0.05); padding-top:1rem;">
                        <div><div style="font-size:0.6rem; color:var(--text-muted); text-transform:uppercase;">Dist</div><div style="font-weight:700; color: white;">${run.user_distance}</div></div>
                        <div><div style="font-size:0.6rem; color:var(--text-muted); text-transform:uppercase;">Lvl</div><div style="font-weight:700; color: white;">${run.user_level ? run.user_level.split(' ')[0] : 'N/A'}</div></div>
                    </div>
                </div>`).join('');
        }

        async function loadStrava() {
            if(!user.is_admin) return;
            try {
                const res = await fetch(`/api/strava-activities?userId=${user.id}`);
                const acts = await res.json();
                if(acts.length > 0) {
                    document.getElementById('stravaSection').style.display = 'block';
                    document.getElementById('stravaContainer').innerHTML = acts.map(a => `
                        <div class="glass-card" style="padding:1.2rem; display: flex; justify-content: space-between; align-items: center;">
                            <div><div style="font-weight:800; color: white;">${a.name}</div><div style="font-size: 0.7rem; color: var(--text-muted);">${new Date(a.start_date_local).toLocaleDateString()}</div></div>
                            <div style="text-align: right;"><div style="font-weight: 800; color: var(--peach-accent);">${(a.distance/1000).toFixed(2)} KM</div><div style="font-size: 0.6rem; color: var(--text-muted);">STRAVA</div></div>
                        </div>`).join('');
                }
            } catch (e) {}
        }

        loadProfile(); loadStrava();
    </script>
</body>
</html>
