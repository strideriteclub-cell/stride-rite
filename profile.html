<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --neon-accent: #584adc; --peach-accent: #ff8b6a; --text-muted: #a1a1aa; }
        .profile-container { max-width: 900px; margin: 0 auto; padding: 2rem; margin-top: 100px; }
        .profile-header { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .avatar-circle { width: 100px; height: 100px; background: linear-gradient(135deg, var(--neon-accent), var(--peach-accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; color: white; box-shadow: 0 10px 30px rgba(88, 74, 220, 0.3); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 4rem; }
        .profile-stat-card { text-align: center; padding: 2.5rem 1rem; background: rgba(255,255,255,0.03); border-bottom: 4px solid var(--neon-accent); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-value { font-size: 3rem; font-weight: 800; font-family: 'Outfit'; margin-bottom: 0.5rem; }
        .stat-label { color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: 600; }
        .story-btn {
            margin-top: 1rem; width: 100%; background: rgba(88, 74, 220, 0.1); border: 1px solid var(--neon-accent);
            color: var(--neon-accent); padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 800;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase;
        }
        .story-btn:hover { background: var(--neon-accent); color: white; transform: translateY(-2px); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">STRIDE RITE</div>
        <div class="nav-links">
            <a href="dashboard.html" class="btn btn-secondary">📊 Dashboard</a>
            <button id="mockBtn" class="btn btn-secondary hidden" onclick="runDeepSync()" style="color: #ff4444; border-color: #ff4444;">🛠 Mock Data Sync</button>
            <a href="#" onclick="AuthService.logout()">Log Out</a>
        </div>
    </nav>

    <div class="profile-container">
        <header class="profile-header">
            <div class="avatar-circle" id="userInitial">S</div>
            <div class="profile-info">
                <h1 id="userName">Runner Name</h1>
                <div style="color: var(--text-muted);" id="userEmail">email@example.com</div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="profile-stat-card"><div class="stat-value" id="totalRuns">0</div><div class="stat-label">Total Runs</div></div>
            <div class="profile-stat-card"><div class="stat-value" id="totalKms">0.0</div><div class="stat-label">Total Kms</div></div>
        </div>

        <h2 style="font-family:'Outfit'; margin-bottom: 1.5rem;">👟 Community Activity</h2>
        <div class="b-grid" id="historyContainer"></div>
        <canvas id="storyCanvas" width="1080" height="1920" style="display:none;"></canvas>
    </div>

    <script src="app.js"></script>
    <script>
        const user = AuthService.getCurrentUser();
        if (!user) window.location.href = 'index.html';
        document.getElementById('userName').innerText = user.name;
        document.getElementById('userEmail').innerText = user.email;
        document.getElementById('userInitial').innerText = user.name[0];
        if (user.is_admin) document.getElementById('mockBtn').classList.remove('hidden');

        async function runDeepSync() {
            Swal.fire({ title:'Deep Syncing...', text:'Fixing IDs...', background:'#141419', didOpen:()=>Swal.showLoading() });
            const ADMIN_UUID = 'd1b11111-1111-1111-1111-111111111111';
            const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };
            const runId = 'run-' + Date.now();

            try {
                // Ensure record exists
                await fetch(`${SUPABASE_URL}/rest/v1/stride_users`, { method:'POST', headers, body:JSON.stringify({ id:ADMIN_UUID, name:user.name, email:user.email, is_admin:true, level:'Elite' })});
                // Create Mock
                await fetch(`${SUPABASE_URL}/rest/v1/stride_runs`, { method:'POST', headers, body:JSON.stringify({ id:runId, date_label:'[EXPORTED] Monday Night Run || 2026-04-13', location:'Zayed Park', created_by:ADMIN_UUID })});
                await fetch(`${SUPABASE_URL}/rest/v1/stride_registrations`, { method:'POST', headers, body:JSON.stringify({ id:'reg-'+Date.now(), run_id:runId, user_id:ADMIN_UUID, distance:'10K', level:'Elite', registered_at:new Date() })});
                
                Swal.fire({ icon:'success', title:'Success!', text:'Run added.', background:'#141419' }).then(() => location.reload());
            } catch (e) { Swal.fire({ icon:'error', title:'Error', background:'#141419' }); }
        }

        async function loadProfile() {
            const stats = await AppService.getUserStats(user.id);
            document.getElementById('totalRuns').innerText = stats.totalRuns;
            document.getElementById('totalKms').innerText = stats.totalKms;
            
            const container = document.getElementById('historyContainer');
            if (stats.pastRuns.length === 0) {
                container.innerHTML = `<p style="text-align:center; padding:3rem; grid-column:1/-1;">No runs yet.</p>`; return;
            }
            container.innerHTML = stats.pastRuns.map(run => `
                <div class="glass-card" style="padding:1.5rem;">
                    <div style="font-weight:800; font-size:1.2rem;">${run.date_display}</div>
                    <div style="color:var(--peach-accent); margin-bottom:1rem;">📍 ${run.location}</div>
                    <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                        <div>DIST: ${run.user_distance}</div>
                    </div>
                    <button class="story-btn" onclick="openStory('${run.date_display}', '${run.user_distance}')">🤳 Generate Story</button>
                </div>`).join('');
        }

        window.openStory = (date, dist) => {
            const canvas = document.getElementById('storyCanvas'); const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0d0c11'; ctx.fillRect(0,0,1080,1920);
            ctx.fillStyle = '#584adc'; ctx.font = '800 100px Outfit'; ctx.textAlign = 'center';
            ctx.fillText('STRIDE RITE', 540, 300);
            ctx.fillStyle = 'white'; ctx.font = '800 150px Outfit'; ctx.fillText(dist, 540, 900);
            ctx.font = '600 60px Outfit'; ctx.fillText(date, 540, 1000);
            const png = canvas.toDataURL();
            Swal.fire({ title:'Your Story', imageUrl:png, background:'#141419', confirmButtonText:'Download PNG' }).then(s => {
                if(s.isConfirmed) { const a = document.createElement('a'); a.download='story.png'; a.href=png; a.click(); }
            });
        }
        loadProfile();
    </script>
</body>
</html>
