<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=26">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .profile-container { max-width: 900px; margin: 0 auto; padding: 2rem; margin-top: 100px; }
        .stat-card { text-align: center; padding: 2rem 1rem; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .bib-container { margin: 2rem 0; }
        .bib-card { background: white; color: #111; border-radius: 12px; padding: 24px; border: 12px solid #ff6b35; box-shadow: 0 20px 40px rgba(0,0,0,0.4); max-width: 320px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .bib-number { font-family: 'Outfit'; font-size: 6rem; font-weight: 800; line-height: 1; margin: 10px 0; }
        .qr-wrap { background: white; padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="font-family:'Outfit'; font-weight:800; font-size:1.5rem;">S<span style="color:#ff8b6a;">.</span></div>
        <div class="nav-links" id="navLinks">
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="#" onclick="AuthService.logout()">Logout</a>
        </div>
    </nav>

    <div class="profile-container">
        <h1 id="userName" style="font-family:'Outfit'; font-size:2.5rem;">Runner</h1>
        <p id="userEmail" style="color:#a1a1aa;"></p>

        <div class="bib-container" id="bibSection" style="display: none;">
            <div class="bib-card">
                <div style="font-weight:900; color:#ff6b35;">STRIDE RITE</div>
                <div id="bibName" style="font-weight:700; margin-top:5px;">RUNNER</div>
                <div class="bib-number" id="bibNumber">000</div>
                <div class="qr-wrap" id="qrcode"></div>
                <div style="margin-top:10px; font-size:0.7rem; color:#888;">CHECK-IN PASSPORT</div>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:1.5rem; margin-top:2rem;">
            <div class="stat-card"><h3>Runs</h3><div style="font-size:3rem; font-weight:800;" id="totalRuns">0</div></div>
            <div class="stat-card"><h3>KMs</h3><div style="font-size:3rem; font-weight:800;" id="totalKms">0.0</div></div>
        </div>
    </div>

    <script src="app.js?v=26"></script>
    <script>
        const user = AuthService.getCurrentUser();
        if (!user) window.location.href = 'index.html';

        document.getElementById('userName').innerText = user.name;
        document.getElementById('userEmail').innerText = user.email;

        async function init() {
            if (user.email === 'tsmhaleem@gmail.com') {
                const nl = document.getElementById('navLinks');
                nl.innerHTML = '<a href="admin-scanner.html" style="color:#ff8b6a; font-weight:800;">📡 Admin Scan</a>' + nl.innerHTML;
            }

            const stats = await AppService.getUserStats(user.id);
            document.getElementById('totalRuns').innerText = stats.totalRuns;
            document.getElementById('totalKms').innerText = stats.totalKms;

            if (user.bib_number) {
                document.getElementById('bibSection').style.display = 'block';
                document.getElementById('bibNumber').innerText = user.bib_number;
                const regs = await dbGet('stride_registrations', `user_id=eq.${user.id}&order=registered_at.desc&limit=1`);
                if (regs.length > 0) {
                    new QRCode(document.getElementById("qrcode"), { text: regs[0].id, width: 240, height: 240 });
                } else {
                    document.getElementById("qrcode").innerHTML = "<p style='padding:20px; font-size:0.8rem;'>Join a run to unlock QR</p>";
                }
            }
        }
        init();
    </script>
</body>
</html>
