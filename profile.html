<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=22">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .profile-container { max-width: 900px; margin: 0 auto; padding: 2rem; margin-top: 100px; }
        .profile-header { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .avatar-circle { width: 100px; height: 100px; background: linear-gradient(135deg, var(--neon-accent), var(--peach-accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; color: white; box-shadow: 0 10px 30px rgba(88, 74, 220, 0.3); flex-shrink: 0; }
        .profile-info h1 { font-family: 'Outfit'; font-size: 2rem; margin-bottom: 0.5rem; }
        .badge { display: inline-block; padding: 4px 12px; background: rgba(255,180,100,0.15); color: var(--peach-accent); border-radius: 50px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; border: 1px solid var(--peach-accent); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .profile-stat-card { text-align: center; padding: 2rem 1rem; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid var(--border-color); border-bottom: 4px solid var(--neon-accent); }
        .stat-value { font-size: 3rem; font-weight: 800; font-family: 'Outfit'; margin-bottom: 0.5rem; }
        .stat-label { color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: 600; }
        
        .bib-container { margin-bottom: 3rem; perspective: 1000px; }
        .bib-card { background: white; color: #1a1a1f; border-radius: 12px; padding: 20px; position: relative; border: 12px solid #ff6b35; box-shadow: 0 20px 40px rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; text-align: center; overflow: hidden; width: 280px; margin: 0 auto; }
        .bib-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 40px; background: #ff6b35; z-index: 0; }
        .bib-logo { font-family: 'Outfit'; font-weight: 900; font-size: 1.4rem; color: white; position: relative; z-index: 1; margin-bottom: 15px; letter-spacing: -1px; }
        .bib-number { font-family: 'Outfit'; font-size: 5rem; font-weight: 800; line-height: 1; margin: 10px 0; color: #1a1a1f; z-index: 1; }
        .bib-name { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; color: #1a1a1f; z-index: 1; margin-bottom: 12px; }
        .qr-wrap { background: white; padding: 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); z-index: 1; }
        .bib-footer { margin-top: 15px; font-size: 0.65rem; font-weight: 700; color: rgba(0,0,0,0.3); text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="font-family:'Outfit'; font-weight:800; font-size:1.5rem;">S<span style="color:var(--peach-accent);">.</span></div>
        <div class="nav-links">
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="index.html">🏠 Home</a>
            <a href="#" onclick="AuthService.logout()">Logout</a>
        </div>
    </nav>

    <div class="profile-container animate-up">
        <div class="profile-header">
            <div class="avatar-circle" id="userInitial">S</div>
            <div class="profile-info">
                <h1 id="userName">Runner</h1>
                <div><span class="badge" id="userLevelBadge">Beginner</span></div>
                <div style="color:var(--text-muted); font-size:0.95rem; margin-top:5px;">📧 <span id="userEmail"></span></div>
            </div>
        </div>

        <div class="bib-container animate-up" id="bibSection" style="display: none;">
            <div class="bib-card">
                <div class="bib-logo">STRIDE RITE</div>
                <div class="bib-name" id="bibName">RUNNER</div>
                <div class="bib-number" id="bibNumber">000</div>
                <div class="qr-wrap" id="qrcode"></div>
                <div class="bib-footer">Check-In Passport</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="profile-stat-card"><div class="stat-value" id="totalRuns">0</div><div class="stat-label">Total Runs</div></div>
            <div class="profile-stat-card" style="border-bottom-color: var(--peach-accent);"><div class="stat-value" id="totalKms">0.0</div><div class="stat-label">Total KM</div></div>
            <div class="profile-stat-card" style="border-bottom-color: #22c55e;"><div class="stat-value" id="tourProgress">0%</div><div class="stat-label">Tour Progress</div></div>
        </div>
    </div>

    <script src="app.js?v=22"></script>
    <script>
        const user = AuthService.getCurrentUser();
        if (!user) window.location.href = 'index.html';

        document.getElementById('userName').innerText = user.name;
        document.getElementById('userEmail').innerText = user.email;
        document.getElementById('userInitial').innerText = user.name.charAt(0).toUpperCase();
        document.getElementById('userLevelBadge').innerText = user.level || 'Runner';

        async function loadProfile() {
            const stats = await AppService.getUserStats(user.id);
            document.getElementById('totalRuns').innerText = stats.totalRuns;
            document.getElementById('totalKms').innerText = stats.totalKms;
            document.getElementById('tourProgress').innerText = `${stats.completionRate}%`;

            if (user.bib_number) {
                document.getElementById('bibSection').style.display = 'block';
                document.getElementById('bibNumber').innerText = user.bib_number;
                document.getElementById('bibName').innerText = user.name;
                
                const regs = await dbGet('stride_registrations', `user_id=eq.${user.id}&order=registered_at.desc&limit=1`);
                if (regs && regs.length > 0) {
                    new QRCode(document.getElementById("qrcode"), { text: regs[0].id, width: 140, height: 140 });
                } else {
                    document.getElementById("qrcode").innerHTML = "<p style='font-size:0.7rem; color:#888; padding:20px;'>Register for a run to see QR</p>";
                }
            }
        }
        loadProfile();
    </script>
</body>
</html>
