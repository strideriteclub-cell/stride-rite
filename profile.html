<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=5">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .profile-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            margin-top: 100px; /* Space for navbar */
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .avatar-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--neon-accent), var(--peach-accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 10px 30px rgba(88, 74, 220, 0.3);
        }
        .profile-info h1 {
            font-family: 'Outfit';
            font-size: 2rem;
            margin-bottom: 0.2rem;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 180, 100, 0.15);
            color: var(--peach-accent);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid var(--peach-accent);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        /* Specific Profile Card Style to avoid collision */
        .profile-stat-card {
            text-align: center;
            padding: 2rem 1rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-bottom: 4px solid var(--neon-accent);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .profile-stat-card.peach {
            border-bottom-color: var(--peach-accent);
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: 'Outfit';
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .stat-label {
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .history-title {
            font-family: 'Outfit';
            font-size: 1.6rem;
            margin-top: 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        /* Strava UI */
        .strava-connect-btn {
            background: #FC6100;
            color: white !important;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-family: 'Outfit';
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            text-decoration: none;
            width: fit-content;
        }
        .strava-connect-btn:hover { background: #E55600; transform: translateY(-2px); }
        .strava-section {
            margin: 3rem 0;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .strava-run-card {
            background: rgba(252, 97, 0, 0.05);
            border: 1px solid rgba(252, 97, 0, 0.1);
        }
        .strava-badge {
            background: #FC6100;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <div style="font-family:'Outfit'; font-weight:800; font-size:1.5rem;">S<span style="color:var(--peach-accent);">.</span></div>
            <div style="font-family:'Outfit'; font-weight:800;">STRIDE RITE</div>
        </div>
        <div class="nav-links">
            <a href="index.html">🏠 Home</a>
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="#" onclick="AuthService.logout()">Log Out</a>
        </div>
    </nav>

    <div class="profile-container">
        <header class="profile-header animate-up">
            <div class="avatar-circle" id="userInitial">S</div>
            <div class="profile-info">
                <h1 id="userName">Runner Name</h1>
                <div style="margin-bottom: 0.8rem;">
                    <span class="badge" id="userLevelBadge">Intermediate</span>
                </div>
                <div style="color: var(--text-muted); font-size: 0.9rem;">
                    📧 <span id="userEmail">email@example.com</span>
                </div>
            </div>
        </header>

        <div class="stats-grid animate-up delay-1">
            <div class="profile-stat-card">
                <div class="stat-value" id="totalRuns">0</div>
                <div class="stat-label">Total Runs</div>
            </div>
            <div class="profile-stat-card peach">
                <div class="stat-value" id="totalKms">0.0</div>
                <div class="stat-label">Total Kilometers</div>
            </div>
            <div class="profile-stat-card">
                <div class="stat-value" id="avgDistance">0.0</div>
                <div class="stat-label">Avg Range</div>
            </div>
        </div>

        <!-- Strava Section -->
        <div id="stravaSection" class="strava-section animate-up delay-2" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 class="history-title" style="margin: 0;">🔥 Strava Feed</h2>
                <div id="stravaStatus"></div>
            </div>
            <div class="b-grid" id="stravaContainer">
                <!-- Data injected here -->
            </div>
        </div>

        <h2 class="history-title animate-up delay-3">👟 Recent Activity</h2>
        <div class="b-grid" id="historyContainer">
            <!-- History injected here -->
        </div>
    </div>

    <script src="app.js?v=7"></script>
    <script>
        const user = AuthService.getCurrentUser();
        if (!user) window.location.href = 'index.html';

        document.getElementById('userName').innerText = user.name;
        document.getElementById('userEmail').innerText = user.email;
        document.getElementById('userInitial').innerText = user.name.charAt(0).toUpperCase();
        document.getElementById('userLevelBadge').innerText = user.level || 'Beginner';

        // Strava Success/Error Alerts
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('strava')) {
            const status = urlParams.get('strava');
            if (status === 'success') {
                Swal.fire({ title: 'Connected!', text: 'Your Strava count linked successfully.', icon: 'success', background: '#1a1a1e', color: '#fff' });
            } else {
                Swal.fire({ title: 'Error', text: urlParams.get('msg') || 'Failed to connect.', icon: 'error', background: '#1a1a1e', color: '#fff' });
            }
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        async function loadStrava() {
            const stravaSection = document.getElementById('stravaSection');
            const stravaStatus = document.getElementById('stravaStatus');
            const stravaContainer = document.getElementById('stravaContainer');

            // Corrected variables from app.js
            const dbUserRes = await fetch(`${SUPABASE_URL}/rest/v1/stride_users?id=eq.${user.id}`, {
                headers: defaultHeaders
            });
            const dbUserData = await dbUserRes.json();
            const dbUser = dbUserData[0];

            stravaSection.style.display = 'block';

            if (!dbUser.strava_access_token) {
                stravaStatus.innerHTML = `
                    <a href="https://www.strava.com/oauth/authorize?client_id=203804&redirect_uri=https://stride-rite.vercel.app/api/strava-callback&response_type=code&scope=activity:read_all&state=${user.id}" class="strava-connect-btn">
                        Connect Strava
                    </a>
                `;
                stravaContainer.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); opacity:0.5;">Personal Strava runs will appear here once connected.</div>`;
                return;
            }

            stravaStatus.innerHTML = `<span style="color:var(--text-muted); font-size:0.8rem;">✅ Connected</span>`;
            stravaContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem;">⏳ Fetching runs...</div>`;

            try {
                const res = await fetch(`/api/strava-activities?userId=${user.id}`);
                const activities = await res.json();

                if (!activities || activities.length === 0) {
                    stravaContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:var(--text-muted);">No recent runs found on your Strava.</div>`;
                    return;
                }

                stravaContainer.innerHTML = activities.map(a => {
                    const date = new Date(a.start_date_local).toLocaleDateString();
                    const dist = (a.distance / 1000).toFixed(2);
                    const pace = formatPace(a.moving_time, a.distance);
                    return `
                        <div class="glass-card strava-run-card" style="padding: 1.2rem; border-radius: 12px; text-align: left;">
                            <div style="font-weight: 800; color: white;">${a.name}</div>
                            <div style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.5rem;">📅 ${date}</div>
                            <div style="display: flex; gap: 1rem;">
                                <div><div style="font-size:0.6rem; color:var(--text-muted);">DISTANCE</div><div style="font-weight:700;">${dist}km</div></div>
                                <div><div style="font-size:0.6rem; color:var(--text-muted);">PACE</div><div style="font-weight:700;">${pace}/km</div></div>
                            </div>
                        </div>`;
                }).join('');
            } catch (e) {
                stravaContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#ff4444;">Error fetching data.</div>`;
            }
        }

        function formatPace(seconds, meters) {
            if (meters === 0) return '0:00';
            const km = meters / 1000;
            const paceMin = (seconds / 60) / km;
            const mins = Math.floor(paceMin);
            const secs = Math.round((paceMin - mins) * 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        async function loadProfile() {
            const historyContainer = document.getElementById('historyContainer');
            const stats = await AppService.getUserStats(user.id);
            document.getElementById('totalRuns').innerText = stats.totalRuns;
            document.getElementById('totalKms').innerText = stats.totalKms;
            const avg = stats.totalRuns > 0 ? (stats.totalKms / stats.totalRuns).toFixed(1) : 0.0;
            document.getElementById('avgDistance').innerText = avg;

            if (!stats.pastRuns || stats.pastRuns.length === 0) {
                historyContainer.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:3rem;">No community runs completed yet.</p>`;
                return;
            }

            historyContainer.innerHTML = stats.pastRuns.map(run => `
                <div class="glass-card" style="padding: 1.5rem; text-align: left;">
                    <div style="font-weight: 800; font-size: 1.1rem;">${run.date_display}</div>
                    <div style="color: var(--peach-accent); font-size: 0.85rem;">📍 ${run.location}</div>
                    <div style="margin-top:0.5rem; font-weight:700;">${run.user_distance}</div>
                </div>`).join('');
        }

        loadProfile();
        loadStrava();
    </script>
</body>
</html>
