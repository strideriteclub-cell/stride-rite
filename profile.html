<!-- profile.html (REDESIGNED) -->
<!-- Full polished code with better spacing and Shop button -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=10">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .profile-wrapper { max-width: 1000px; margin: 0 auto; padding: 4rem 5%; }
        .profile-header { display: flex; align-items: center; gap: 2rem; margin-bottom: 4rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 3rem; }
        .avatar { width: 120px; height: 120px; background: linear-gradient(135deg, var(--neon-accent), var(--peach-accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 800; color: white; box-shadow: 0 10px 30px rgba(88, 74, 220, 0.2); }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 5rem; }
        .stat-box { padding: 3rem 2rem; text-align: center; border-bottom: 4px solid var(--neon-accent); transition: 0.3s; }
        .stat-box:hover { transform: translateY(-5px); background: rgba(255,255,255,0.05); }
        .stat-box.peach { border-bottom-color: var(--peach-accent); }
        .stat-num { font-size: 3.5rem; font-weight: 800; font-family: 'Outfit'; margin-bottom: 0.5rem; line-height: 1; }
        .stat-lab { color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: 700; }
        .section-title { font-family: 'Outfit'; font-size: 1.8rem; margin-bottom: 2rem; color: white; border-left: 4px solid var(--peach-accent); padding-left: 15px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Stride Rite</div>
        <div class="nav-links">
            <a href="index.html" class="btn btn-secondary" style="padding: 0.4rem 1rem; font-size: 0.85rem; margin-right: 8px;">🏠 Home</a>
            <a href="dashboard.html" class="btn btn-secondary" style="padding: 0.4rem 1rem; font-size: 0.85rem; margin-right: 8px;">📊 Dashboard</a>
            <a href="shop.html" id="shopLink" class="btn btn-secondary hidden" style="padding: 0.4rem 1rem; font-size: 0.85rem; margin-right: 8px; border-color:var(--neon-accent); color:var(--neon-accent);">🛒 Shop</a>
            <a href="#" onclick="AuthService.logout()">Log Out</a>
        </div>
    </nav>

    <div class="profile-wrapper">
        <header class="profile-header animate-up">
            <div class="avatar" id="uInit">S</div>
            <div>
                <h1 id="uName" style="font-family:'Outfit'; font-size:3rem; margin-bottom:0.5rem;">Runner</h1>
                <p id="uEmail" style="color: var(--text-muted); font-size:1.1rem;"></p>
            </div>
        </header>

        <div class="stats-row animate-up delay-1">
            <div class="glass-card stat-box">
                <div class="stat-num" id="statRuns">0</div>
                <div class="stat-lab">Total Runs</div>
            </div>
            <div class="glass-card stat-box peach">
                <div class="stat-num" id="statKms">0.0</div>
                <div class="stat-lab">Total Kilometers</div>
            </div>
        </div>

        <h2 class="section-title animate-up delay-2">👟 Your Activity History</h2>
        <div class="b-grid" id="histCont">
            <!-- Runs injected here -->
        </div>
    </div>

    <script src="app.js?v=10"></script>
    <script>
        const user = AuthService.getCurrentUser();
        if (!user) window.location.href = 'index.html';
        document.getElementById('uName').innerText = user.name;
        document.getElementById('uEmail').innerText = user.email;
        document.getElementById('uInit').innerText = user.name.charAt(0).toUpperCase();

        // RESTORED: Show shop link
        AppService.getShopStatus().then(isOpen => {
            if (isOpen || user.is_admin) document.getElementById('shopLink').classList.remove('hidden');
        });

        async function init() {
            const stats = await AppService.getUserStats(user.id);
            document.getElementById('statRuns').innerText = stats.totalRuns;
            document.getElementById('statKms').innerText = stats.totalKms;
            
            const cont = document.getElementById('histCont');
            if (stats.pastRuns.length === 0) {
                cont.innerHTML = `<div style="grid-column: 1/-1; padding: 3rem; text-align: center; color: var(--text-muted); border: 1px dashed rgba(255,255,255,0.1); border-radius: 12px;">No runs completed yet! 🏁</div>`;
                return;
            }
            cont.innerHTML = stats.pastRuns.map(run => `
                <div class="glass-card" style="padding: 2rem; border: 1px solid rgba(255,255,255,0.05); text-align: left;">
                    <div style="font-weight: 800; font-family: 'Outfit'; color:white; font-size:1.3rem; margin-bottom:0.3rem;">${run.date_display}</div>
                    <div style="color: var(--peach-accent); font-size: 0.85rem; margin-bottom:1.5rem;">📍 ${run.location}</div>
                    <div style="display: flex; gap: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.2rem;">
                        <div>
                            <div style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase;">Distance</div>
                            <div style="font-weight: 700; color: white;">${run.user_distance}</div>
                        </div>
                        <div>
                            <div style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase;">Level</div>
                            <div style="font-weight: 700; color: white;">${run.user_level?.split(' ')[0] || 'N/A'}</div>
                        </div>
                    </div>
                </div>`).join('');
        }
        init();
    </script>
</body>
</html>
