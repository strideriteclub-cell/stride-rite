<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=12">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">STRIDE RITE</div>
        <div class="nav-links">
            <a href="dashboard.html" class="btn btn-secondary">📊 Dashboard</a>
            <a href="#" onclick="AuthService.logout()">Log Out</a>
        </div>
    </nav>

    <div class="profile-container" style="padding-top:120px; max-width:900px; margin:0 auto;">
        <header class="profile-header animate-up" style="display:flex; align-items:center; gap:2rem; margin-bottom:3rem;">
            <div id="userInitial" style="width:100px; height:100px; border-radius:50%; background:var(--neon-accent); display:flex; align-items:center; justify-content:center; font-size:2.5rem; font-weight:800; color:white;">A</div>
            <div>
                <h1 id="userName" style="font-family:'Outfit'; font-size:2.5rem; margin:0;">Runner Name</h1>
                <p id="userEmail" style="color:var(--text-muted); margin:0;">email@example.com</p>
            </div>
        </header>

        <div class="stats-grid animate-up" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:1.5rem; margin-bottom:4rem;">
            <div class="glass-card" style="text-align:center; padding:2rem;">
                <div class="stat-value" id="totalRuns" style="font-size:3rem; font-weight:800; font-family:'Outfit';">0</div>
                <div style="text-transform:uppercase; font-size:0.7rem; color:var(--text-muted); font-weight:700;">Total Runs</div>
            </div>
            <div class="glass-card" style="text-align:center; padding:2rem;">
                <div class="stat-value" id="totalKms" style="font-size:3rem; font-weight:800; font-family:'Outfit';">0.0</div>
                <div style="text-transform:uppercase; font-size:0.7rem; color:var(--text-muted); font-weight:700;">Total Kms</div>
            </div>
        </div>

        <h2 style="font-family:'Outfit'; margin-bottom:1.5rem;">🔥 Strava Feed</h2>
        <div id="stravaContainer" class="b-grid"></div>
    </div>

    <script src="app.js"></script>
    <script>
        const user = AuthService.getCurrentUser();
        if (!user) window.location.href = 'index.html';
        document.getElementById('userName').innerText = user.name;
        document.getElementById('userEmail').innerText = user.email;
        document.getElementById('userInitial').innerText = user.name[0];

        async function loadProfile() {
            const stats = await AppService.getUserStats(user.id);
            document.getElementById('totalRuns').innerText = stats.totalRuns;
            document.getElementById('totalKms').innerText = stats.totalKms;

            // Load Strava Activities
            if (user.is_admin) {
                const res = await fetch(`/api/strava-activities?userId=${user.id}`);
                const data = await res.json();
                const container = document.getElementById('stravaContainer');
                container.innerHTML = data.map(a => `
                    <div class="glass-card" style="padding:1.5rem;">
                        <div style="font-weight:800;">${a.name}</div>
                        <div style="color:var(--peach-accent);">${(a.distance/1000).toFixed(2)} KM</div>
                        <div style="font-size:0.7rem; color:var(--text-muted);">${new Date(a.start_date).toLocaleDateString()}</div>
                    </div>
                `).join('');
            }
        }
        loadProfile();
    </script>
</body>
</html>
