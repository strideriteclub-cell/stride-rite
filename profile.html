<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=27">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .profile-container { max-width: 900px; margin: 0 auto; padding: 2rem; margin-top: 100px; }
        .profile-header { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .avatar-circle { width: 100px; height: 100px; background: linear-gradient(135deg, var(--neon-accent), var(--peach-accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; color: white; box-shadow: 0 10px 30px rgba(88, 74, 220, 0.3); flex-shrink: 0; }
        .profile-info h1 { font-family: 'Outfit'; font-size: 2rem; margin-bottom: 0.5rem; }
        .badge { display: inline-block; padding: 4px 12px; background: rgba(255,180,100,0.15); color: var(--peach-accent); border-radius: 50px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; border: 1px solid var(--peach-accent); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .profile-stat-card { text-align: center; padding: 2rem 1rem; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid var(--border-color); border-bottom: 4px solid var(--neon-accent); }
        .profile-stat-card.peach { border-bottom-color: var(--peach-accent); }
        .stat-value { font-size: 3rem; font-weight: 800; font-family: 'Outfit'; line-height: 1; margin-bottom: 0.5rem; }
        .stat-label { color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: 600; }
        .history-title { font-family: 'Outfit'; font-size: 1.8rem; margin-bottom: 1.5rem; color: white; }

        /* Bib Card Styles */
        .bib-container { margin-bottom: 3rem; position: relative; display: flex; justify-content: center; }
        .bib-card { 
            width: 300px; 
            height: 480px; 
            background: rgba(13, 12, 17, 0.85); 
            backdrop-filter: blur(20px); 
            border-radius: 30px; 
            padding: 30px; 
            position: relative; 
            border: 2px solid rgba(255, 107, 53, 0.3); 
            box-shadow: 0 0 40px rgba(255, 107, 53, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.02); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bib-card:hover { transform: scale(1.02); border-color: rgba(255, 107, 53, 0.6); }
        .bib-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 107, 53, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        .shimmer {
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shimmer 4s infinite;
        }
        @keyframes shimmer { 100% { left: 200%; } }
        
        .bib-logo { font-family: 'Outfit'; font-weight: 800; font-size: 0.9rem; color: #ff6b35; letter-spacing: 4px; margin-bottom: 25px; text-transform: uppercase; }
        .bib-label { font-family: 'Outfit'; font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 4px; }
        .bib-name { font-family: 'Outfit'; font-weight: 800; font-size: 1.3rem; color: white; margin-bottom: 25px; line-height: 1.1; }
        
        .qr-section {
            position: relative;
            padding: 20px;
            margin-bottom: 25px;
        }
        .qr-corner { position: absolute; width: 20px; height: 20px; border: 2px solid #ff6b35; border-radius: 4px; }
        .qr-tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .qr-tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
        .qr-bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
        .qr-br { bottom: 0; right: 0; border-left: 0; border-top: 0; }
        
        .qr-wrap { 
            background: white; 
            padding: 8px; 
            border-radius: 12px; 
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.1);
        }
        
        .bib-number { 
            font-family: 'Outfit'; 
            font-size: 4.5rem; 
            font-weight: 900; 
            line-height: 1; 
            color: white; 
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.2);
        }
        .bib-status { font-size: 0.7rem; font-weight: 800; color: #ff6b35; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="font-family:'Outfit'; font-weight:800; font-size:1.5rem;">S<span style="color:var(--peach-accent);">.</span></div>
        <div class="nav-links">
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="index.html">🏠 Home</a>
            <a href="#" onclick="AuthService.logout()">Logout</a>
        </div>
    </nav>

    <div class="profile-container animate-up">
        <div class="profile-header">
            <div class="avatar-circle" id="userInitial">S</div>
            <div class="profile-info">
                <h1 id="userName">Runner</h1>
                <div style="margin-bottom:0.75rem;"><span class="badge" id="userLevelBadge">Beginner</span></div>
                <div style="color:var(--text-muted); font-size:0.95rem;">📧 <span id="userEmail"></span></div>
            </div>
        </div>

        <div class="bib-container animate-up" id="bibSection" style="display: none; margin-top: 1rem;">
            <div class="bib-card">
                <div class="shimmer"></div>
                <div class="bib-logo">Stride Rite</div>
                <div class="bib-label">Verified Runner</div>
                <div class="bib-name" id="bibName">RUNNER</div>
                
                <div class="qr-section">
                    <div class="qr-corner qr-tl"></div>
                    <div class="qr-corner qr-tr"></div>
                    <div class="qr-corner qr-bl"></div>
                    <div class="qr-corner qr-br"></div>
                    <div class="qr-wrap" id="qrcode" style="display: flex; justify-content: center;"></div>
                </div>

                <div class="bib-number" id="bibNumber">000</div>
                <div class="bib-status">Digital Passport</div>
            </div>
            <p style="text-align:center; color:var(--text-muted); font-size:0.8rem; margin: 1rem 0;">Scan this QR code at the event check-in point 📍</p>
        </div>

        <div class="stats-grid" style="grid-template-columns: 1fr 1fr;">
            <div class="profile-stat-card"><div class="stat-value" id="totalRuns">0</div><div class="stat-label">Total Runs</div></div>
            <div class="profile-stat-card" style="border-bottom-color: #22c55e;">
                <div class="stat-value" id="tourProgress">0%</div>
                <div class="stat-label">Tour Progress</div>
            </div>
        </div>

        <section id="tourArchiveSection" style="margin-bottom: 3rem; display: none;">
            <h2 class="history-title">🏆 Tour de Cairo Archive</h2>
            <div id="tourArchiveContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;"></div>
        </section>


        <h2 class="history-title">👟 Run History</h2>
        <div class="b-grid" id="historyContainer"></div>
    </div>

    <script src="app.js?v=32"></script>
    <script>
        const user = AuthService.getCurrentUser();
        if (!user) window.location.href = 'index.html';

        document.getElementById('userName').innerText = user.name;
        document.getElementById('userEmail').innerText = user.email;
        document.getElementById('userInitial').innerText = user.name.charAt(0).toUpperCase();
        document.getElementById('userLevelBadge').innerText = user.level || 'Runner';

        async function loadProfile() {
            const stats = await AppService.getUserStats(user.id);
            document.getElementById('totalRuns').innerText = stats.totalRuns;
            document.getElementById('tourProgress').innerText = `${stats.completionRate}%`;

            // Auto-heal missing bib numbers (especially for new accounts)
            let activeUser = user;
            if (!activeUser.bib_number || activeUser.bib_number === null) {
                try {
                    activeUser = await AppService.assignBibNumber(activeUser.id);
                    localStorage.setItem('stride_user', JSON.stringify(activeUser));
                } catch(e) { console.error("Failed to heal bib", e); }
            }

            // If user has a bib, show the card
            if (activeUser.bib_number) {
                document.getElementById('bibSection').style.display = 'block';
                document.getElementById('bibNumber').innerText = activeUser.bib_number;
                document.getElementById('bibName').innerText = activeUser.name;
                
                // Render LIFETIME QR Code based on the user's permanent Bib Number
                new QRCode(document.getElementById("qrcode"), {
                    text: String(activeUser.bib_number),
                    width: 140,
                    height: 140,
                    colorDark : "#1a1a1f",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }
                const archiveSec = document.getElementById('tourArchiveSection');
                const archiveCont = document.getElementById('tourArchiveContainer');
                archiveSec.style.display = 'block';
                
                const now = new Date();
                const monthName = now.toLocaleString('default', { month: 'long' });
                const isComplete = stats.completionRate === 100;

                archiveCont.innerHTML = `
                    <div class="glass-card" style="padding: 2rem; position: relative; border-bottom: 4px solid ${isComplete ? '#22c55e' : 'var(--peach-accent)'};">
                        ${isComplete ? '<div style="position:absolute; top:1rem; right:1rem; font-size:2rem;">🥇</div>' : ''}
                        <div style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 0.5rem;">${monthName} ${now.getFullYear()}</div>
                        <h3 style="font-family: 'Outfit'; font-size: 1.5rem; margin-bottom: 1rem;">Tour de Cairo</h3>
                        
                        <div style="height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 0.5rem; overflow: hidden;">
                            <div style="width: ${stats.completionRate}%; height: 100%; background: ${isComplete ? '#22c55e' : 'var(--peach-accent)'}; border-radius: 10px;"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                             <span style="color: var(--text-muted);">${stats.tourProgress.filter(s => s.status === 'completed').length} / 8 Districts</span>
                            <span style="font-weight: 700; color: ${isComplete ? '#22c55e' : 'white'};">${isComplete ? 'COMPLETED' : 'IN PROGRESS'}</span>
                        </div>
                    </div>
                `;

            const container = document.getElementById('historyContainer');
            if (!stats.pastRuns || stats.pastRuns.length === 0) {
                container.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-muted);">No community runs attended yet. Join a run to see your history here!</p>`;
                return;
            }
            container.innerHTML = stats.pastRuns.map(run => `
                <div class="glass-card" style="padding:1.5rem;">
                    <div style="font-weight:800; color:white; font-size:1.1rem; margin-bottom:0.3rem;">${run.date_display}</div>
                    <div style="color:var(--peach-accent); font-size:0.8rem; margin-bottom:1rem;">📍 ${run.location}</div>
                    <div style="display:flex; gap:2rem; border-top:1px solid rgba(255,255,255,0.08); padding-top:1rem;">
                        <div><div style="font-size:0.6rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">Distance</div><div style="font-weight:700; color:white;">${run.user_distance}</div></div>
                        <div><div style="font-size:0.6rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">Level</div><div style="font-weight:700; color:white;">${run.user_level || 'N/A'}</div></div>
                    </div>
                </div>`).join('');
        }

        loadProfile();
    </script>
</body>
</html>
