<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=15">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .profile-container { max-width: 900px; margin: 0 auto; padding: 2rem; margin-top: 100px; }
        .avatar-circle { width: 80px; height: 80px; background: linear-gradient(135deg, var(--neon-accent), var(--peach-accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; color: white; margin-bottom: 1.5rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin: 2rem 0 4rem; }
        .stat-card { text-align: center; padding: 2rem; background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border-color); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="font-family:'Outfit'; font-weight:800; font-size:1.5rem;">S<span style="color:var(--peach-accent);">.</span></div>
        <div class="nav-links">
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="index.html">🏠 Home</a>
            <a href="#" onclick="AuthService.logout()">Logout</a>
        </div>
    </nav>

    <div class="profile-container animate-up">
        <div class="avatar-circle" id="userInitial">S</div>
        <h1 id="userName">Runner</h1>
        <p id="userEmail" style="color:var(--text-muted);"></p>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="totalRuns">0</div><div class="stat-label">Runs</div></div>
            <div class="stat-card"><div class="stat-value" id="totalKms">0.0</div><div class="stat-label">KM Total</div></div>
        </div>

        <section id="stravaSection" style="display:none;">
            <h2 style="margin-bottom:1.5rem;">🔥 Strava Activities</h2>
            <div class="b-grid" id="stravaContainer"></div>
        </section>

        <h2 style="margin-top:3rem; margin-bottom:1.5rem;">👟 Run History</h2>
        <div class="b-grid" id="historyContainer"></div>
    </div>

    <script src="app.js?v=21"></script>
    <script>
        const user = AuthService.getCurrentUser();
        if (!user) window.location.href = 'index.html';
        document.getElementById('userName').innerText = user.name;
        document.getElementById('userEmail').innerText = user.email;
        document.getElementById('userInitial').innerText = user.name[0].toUpperCase();

        async function loadProfile() {
            const stats = await AppService.getUserStats(user.id);
            document.getElementById('totalRuns').innerText = stats.totalRuns;
            document.getElementById('totalKms').innerText = stats.totalKms;
            
            const cont = document.getElementById('historyContainer');
            if(!stats.pastRuns || stats.pastRuns.length === 0) {
                cont.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-muted);">No community runs attended yet.</p>`;
                return;
            }
            cont.innerHTML = stats.pastRuns.map(r => `
                <div class="glass-card" style="padding:1.5rem;">
                    <div style="font-weight:800; color:white;">${r.date_display}</div>
                    <div style="color:var(--text-muted); font-size:0.8rem;">${r.user_distance} · ${r.user_level}</div>
                </div>`).join('');
        }

        async function loadStrava() {
            if(!user.is_admin) return;
            const res = await fetch(`/api/strava-activities?userId=${user.id}`);
            const acts = await res.json();
            if(acts.length > 0) {
                document.getElementById('stravaSection').style.display = 'block';
                document.getElementById('stravaContainer').innerHTML = acts.map(a => `
                    <div class="stat-card" style="text-align:left; padding:1.2rem; display:flex; justify-content:space-between; align-items:center;">
                        <div><div style="font-weight:800; color:white;">${a.name}</div><div style="font-size:0.7rem; color:var(--text-muted);">${(a.distance/1000).toFixed(2)} KM</div></div>
                        <div style="font-size:0.6rem; color:var(--peach-accent); font-weight:800;">STRAVA</div>
                    </div>`).join('');
            }
        }
        loadProfile(); loadStrava();
    </script>
</body>
</html>
