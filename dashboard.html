<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #0A0A0A; --card: #141414; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; margin: 0; padding-top: 20px; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 280px 1fr; gap: 30px; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; }
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .main-content { display: flex; flex-direction: column; gap: 30px; }
        .user-header { display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-logout { background: rgba(255,0,0,0.1); color: #ff4444; border: 1px solid rgba(255,0,0,0.2); }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { text-align: center; }
        .stat-val { font-size: 2.5rem; font-weight: 900; color: var(--primary); }
        .stat-label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar">
        <div class="card" style="text-align: center;">
            <div id="user-avatar" style="width: 80px; height: 80px; background: var(--primary); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900;">S</div>
            <h3 id="user-name-sidebar">Member</h3>
            <p id="user-level-sidebar" style="color: #888; font-size: 0.9rem;">Level: —</p>
            <button onclick="AuthService.logout()" class="btn btn-logout" style="width: 100%; margin-top: 10px;">Log Out</button>
        </div>
        <div class="card">
            <h4>Menu</h4>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button onclick="window.location.href='index.html#runs'" class="btn" style="background: transparent; color: white; text-align: left; padding-left: 0;">🏠 My Runs</button>
                <button onclick="window.location.href='shop.html'" class="btn" style="background: transparent; color: white; text-align: left; padding-left: 0;">🛍️ VIP Shop</button>
                <button onclick="window.location.href='gallery.html'" class="btn" style="background: transparent; color: white; text-align: left; padding-left: 0;">📸 Gallery</button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="user-header">
            <h2 style="font-size: 2rem;">Welcome Back, <span id="user-name-header" style="color: var(--primary);">Strider</span>! 👋</h2>
        </div>

        <div class="stat-grid">
            <div class="card stat-card">
                <div class="stat-val" id="stat-total-runs">0</div>
                <div class="stat-label">Runs Completed</div>
            </div>
            <div class="card stat-card">
                <div class="stat-val" id="stat-total-kms">0.0</div>
                <div class="stat-label">Total Kilometers</div>
            </div>
            <div class="card stat-card">
                <div class="stat-val" id="stat-rank">#—</div>
                <div class="stat-label">Global Rank</div>
            </div>
        </div>

        <div class="card">
            <h3>Upcoming Commmunity <span>Runs</span></h3>
            <div id="upcoming-runs-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
                <p style="color: #888;">Checking the streets...</p>
            </div>
        </div>
    </main>
</div>

<script src="app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const user = AuthService.getCurrentUser();
        if (!user) { window.location.href = 'index.html'; return; }
        
        document.getElementById('user-name-header').innerText = user.name.split(' ')[0];
        document.getElementById('user-name-sidebar').innerText = user.name;
        document.getElementById('user-level-sidebar').innerText = `Level: ${user.level || 'Beginner'}`;
        document.getElementById('user-avatar').innerText = user.name.charAt(0).toUpperCase();

        const stats = await AppService.getUserStats(user.id);
        if (stats) {
            document.getElementById('stat-total-runs').innerText = stats.totalRuns || 0;
            document.getElementById('stat-total-kms').innerText = stats.totalKms || '0.0';
        }
    });
</script>
</body>
</html>
