<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=15">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <nav class="navbar">
        <div style="font-family:'Outfit'; font-weight:800; font-size:1.5rem;">S<span style="color:var(--peach-accent);">.</span></div>
        <div class="nav-links"><a href="index.html">🏠 Home</a><a href="shop.html">🛍 Shop</a><a href="profile.html">👤 Profile</a><a href="#" onclick="AuthService.logout()">Logout</a></div>
    </nav>
    <div class="main-container">
        <header class="animate-up" style="margin-bottom: 2rem;">
            <h1 style="font-size: 2rem;">Community Dashboard</h1>
            <p id="welcomeUser" style="color: var(--text-muted);"></p>
        </header>
        <div id="advisorContainer"></div>
        <section><h2 style="margin-bottom: 1.5rem;">🗓 Upcoming Runs</h2><div class="b-grid" id="runsContainer"></div></section>
    </div>
    <script src="app.js?v=21"></script>
    <script>
        const user = AuthService.getCurrentUser();
        if (!user) window.location.href = 'index.html';
        document.getElementById('welcomeUser').innerText = `Welcome back, ${user.name}!`;
        let runSelections = {};
        async function renderRuns() {
            const container = document.getElementById('runsContainer');
            const runs = await AppService.getRuns();
            const myRegs = await AppService.getUserRegistrations(user.id);
            container.innerHTML = runs.map(run => {
                const isReg = myRegs.includes(run.id);
                if (!runSelections[run.id]) runSelections[run.id] = '5K';
                const dist = runSelections[run.id];
                return `<div class="glass-card animate-up" style="padding:2rem; border-bottom:4px solid ${isReg ? '#22c55e' : 'var(--neon-accent)'};"><div style="font-weight:800;font-size:1.5rem;color:white;">${run.date_label}</div><div style="color:var(--text-muted);">📍 ${run.location}</div>${!isReg ? `<div class="dist-selector"><button class="dist-btn ${dist === '2K' ? 'active' : ''}" onclick="selectDist('${run.id}', '2K')">2K</button><button class="dist-btn ${dist === '5K' ? 'active' : ''}" onclick="selectDist('${run.id}', '5K')">5K</button><button class="dist-btn ${dist === '8K' ? 'active' : ''}" onclick="selectDist('${run.id}', '8K')">8K</button></div>` : ''}${isReg ? '<button class="btn btn-secondary btn-block" disabled>✓ Registered</button>' : `<button class="btn btn-primary btn-block" onclick="joinRun('${run.id}')">Join Run</button>`}</div>`;
            }).join('');
            if(runs.length > 0) loadAIAdvisor(runs[0]);
        }
        window.selectDist = (rId, d) => { runSelections[rId] = d; renderRuns(); };
        window.joinRun = async (rId) => { const s = await AppService.registerForRun(rId, runSelections[rId]); if(s) { Swal.fire({icon:'success', title:'Joined!', background:'#141419', color:'#fff'}); renderRuns(); } };
        async function loadAIAdvisor(run) {
            const res = await fetch(`https://api.weatherapi.com/v1/current.json?key=686edc30f7764d08ada12150261604&q=${run.location}`);
            const data = await res.json();
            document.getElementById('advisorContainer').innerHTML = `<div class="advisor-card animate-up"><img src="${data.current.condition.icon}" style="width:50px;"><div><div style="font-size:0.7rem; color:var(--neon-accent); font-weight:800;">🌤 AI ADVISOR</div><div style="font-weight:700; color:white;">PR-breaking conditions: ${data.current.temp_c}°C</div></div></div>`;
        }
        renderRuns();
    </script>
</body>
</html>
