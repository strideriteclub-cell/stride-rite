<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=12">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">STRIDE RITE</div>
        <div class="nav-links">
            <a href="index.html" class="btn btn-secondary">🏠 Home</a>
            <a href="shop.html" class="btn btn-secondary">🛍 VIP Shop</a>
            <a href="profile.html" class="btn btn-secondary">👤 Profile</a>
            <a href="#" onclick="AuthService.logout()">Log Out</a>
        </div>
    </nav>

    <div style="padding:120px 5% 5rem;">
        <h1 style="font-family:'Outfit'; font-size:2.5rem; margin-bottom:2rem;">Upcoming Community Runs</h1>
        <div id="runsContainer" class="b-grid"></div>
    </div>

    <script src="app.js"></script>
    <script>
        const user = AuthService.getCurrentUser();
        if (!user) window.location.href = 'index.html';

        async function render() {
            const runs = await AppService.getRuns();
            const container = document.getElementById('runsContainer');
            container.innerHTML = runs.map(r => `
                <div class="glass-card" style="padding:2rem;">
                    <div style="font-weight:800; font-size:1.5rem; font-family:'Outfit';">${r.date_label}</div>
                    <div style="color:var(--peach-accent); margin-bottom:1.5rem;">📍 ${r.location}</div>
                    <button class="btn btn-primary btn-block" onclick="join('${r.id}')">Register for Run</button>
                </div>
            `).join('');
        }

        window.join = (id) => {
            Swal.fire({ title:'Registering...', background:'#141419', didOpen:()=>Swal.showLoading()});
            AppService.registerForRun(id, '5K', 'Intermediate').then(() => {
                Swal.fire({ icon:'success', title:'Registered!', background:'#141419' });
            });
        };
        render();
    </script>
</body>
</html>
