<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=25">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .dashboard-header { margin-bottom: 3rem; }
        .dashboard-header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .welcome-text { color: var(--text-muted); font-size: 1.1rem; }
        .section-title { font-family: 'Outfit'; font-size: 1.8rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; }
        .runs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .run-card { padding: 2.5rem; border-bottom: 4px solid var(--neon-accent); transition: transform 0.3s; position: relative; }
        .run-card.registered { border-bottom-color: #22c55e; }
        .run-card:hover { transform: translateY(-5px); }
        .run-date { font-weight: 800; font-size: 1.6rem; color: white; margin-bottom: 0.5rem; }
        .run-loc { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1.5rem; display: flex; align-items: flex-start; gap: 6px; }
        .registered-badge { background: rgba(34,197,94,0.15); color: #22c55e; padding: 6px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; display: inline-block; margin-bottom: 1rem; }

        /* Tour Map controls */
        #tourMap .leaflet-control-attribution, #tourMap .leaflet-control-zoom { display: none !important; }

        /* Animated stop markers */
        .m-wrap { position: absolute; width: 0; height: 0; opacity: 0; transform: scale(0); transition: opacity 0.4s, transform 0.4s; }
        .m-wrap.visible { opacity: 1; transform: scale(1); }
        .m-core { position: absolute; width: 14px; height: 14px; background: #ff6b35; border-radius: 50%; border: 2px solid #1a1a1f; transform: translate(-50%,-50%); top: 0; left: 0; z-index: 2; }
        .m-label { position: absolute; transform: translateX(-50%); top: 14px; left: 0; background: rgba(10,10,15,0.95); border: 1px solid #ff6b35; padding: 3px 8px; border-radius: 4px; white-space: nowrap; z-index: 3; font-family:'Outfit'; font-weight: 800; font-size: 10px; color: #ff6b35; }
        .tour-map-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 400; background: rgba(10,10,15,0.35); }

        /* Modal inputs */
        .reg-input { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); padding: 10px 14px; border-radius: 8px; color: #fff; font-size: 0.9rem; font-family: 'Inter', sans-serif; transition: border-color 0.2s; display: block; }
        .reg-input:focus { outline: none; border-color: var(--neon-accent); }
        .reg-input::placeholder { color: rgba(255,255,255,0.3); }
        .dist-opt { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); padding: 10px; border-radius: 6px; font-weight: 800; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
        .dist-opt.active { background: var(--neon-accent) !important; color: #000 !important; border-color: var(--neon-accent) !important; }
        .dist-opt:hover:not(.active) { background: rgba(255,255,255,0.1); color: #fff; }

        /* Custom Logo */
        .custom-logo-container { display: flex; align-items: center; gap: 12px; }
        .custom-logo { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800; color: #fff; position: relative; }
        .custom-logo .dot { position: absolute; top: 4px; right: -8px; width: 8px; height: 8px; background-color: var(--peach-accent); border-radius: 50%; }
        .logo-text-stack { display: flex; flex-direction: column; line-height: 1; }
        .logo-title { font-family: 'Outfit'; font-weight: 800; font-size: 1.2rem; }
        .logo-subtitle { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; border-top: 1px solid var(--neon-accent); padding-top: 2px; margin-top: 2px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="custom-logo-container">
            <div class="custom-logo">S<span class="dot"></span></div>
            <div class="logo-text-stack">
                <span class="logo-title">STRIDE RITE</span>
                <span class="logo-subtitle">Al Rehab Running Community</span>
            </div>
        </div>
        <div class="nav-links">
            <a href="shop.html">🛍 Shop</a>
            <a href="gallery.html">📸 Gallery</a>
            <a href="profile.html">👤 My Profile</a>
            <a href="#" onclick="AuthService.logout()">Logout</a>
        </div>
    </nav>

    <div class="main-container">
        <header class="dashboard-header">
            <h1 id="welcomeUser">Welcome, Runner!</h1>
            <p class="welcome-text">Your central hub for community runs and rewards.</p>
        </header>

        <div id="advisorContainer"></div>

        <!-- Tour de Cairo -->
        <section style="margin-bottom: 3rem;">
            <div class="glass-card" style="padding:0; overflow:hidden; position:relative; border-bottom:4px solid var(--neon-accent);">
                <div style="padding:2rem; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
                    <div>
                        <h2 class="section-title" style="margin-bottom:0;">🗺️ Tour de Cairo</h2>
                        <div style="display:flex; gap:10px; align-items:center; margin-top:5px;">
                            <p style="color:var(--text-muted); font-size:0.9rem; margin:0;">8 Runs · 8 Districts · 1 City</p>
                            <button onclick="showTourInfo()" style="background:none;border:none;color:var(--neon-accent);font-size:0.8rem;text-decoration:underline;cursor:pointer;padding:0;">What is this?</button>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="spotlightNextStop()">🚀 Register for next Stop</button>
                </div>
                <div style="position:relative; height:480px; width:100%; background:#0d0d11; overflow:hidden;">
                    <div id="tourMap" style="width:100%; height:100%;"></div>
                </div>
            </div>
        </section>

        <!-- Upcoming Runs -->
        <section>
            <h2 class="section-title">🗓 Upcoming Community Runs</h2>
            <div class="runs-grid" id="runsContainer">
                <p style="color:var(--text-muted); padding:2rem;">Loading runs...</p>
            </div>
        </section>
    </div>

    <script src="app.js?v=25"></script>
    <script>
        let user = null;
        let runSelections = {};

        window.addEventListener('load', async () => {
            user = AuthService.getCurrentUser();
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('welcomeUser').innerText = 'Welcome back, ' + user.name.split(' ')[0] + '!';
            await initDashboard();
            initTourMap();
        });

        // ─────────────────────────────────────────────────────────────────
        // Dashboard Cards
        // ─────────────────────────────────────────────────────────────────
        async function initDashboard() {
            const container = document.getElementById('runsContainer');
            try {
                const [runs, myRegs] = await Promise.all([AppService.getRuns(), AppService.getUserRegistrations(user.id)]);
                window.lastFetchedRuns = runs;
                window.myRegistrations = myRegs;

                if (!runs || runs.length === 0) {
                    container.innerHTML = '<p style="padding:3rem;text-align:center;color:var(--text-muted);grid-column:1/-1;">No community runs scheduled yet.</p>';
                    return;
                }

                container.innerHTML = runs.map(run => {
                    const isReg = myRegs.includes(run.id);
                    const dist = runSelections[run.id] || '5K';
                    const logoHtml = run.partner_logo
                        ? '<div style="width:40px;height:40px;border-radius:8px;background:#0d0d11;border:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;"><img src="' + run.partner_logo + '" style="max-width:36px;max-height:36px;object-fit:contain;"></div>'
                        : '<div style="width:40px;height:40px;background:var(--neon-accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#000;font-weight:800;flex-shrink:0;">S.</div>';
                    // Extract clean IG handle (handles full URLs too)
                    const igHandle = typeof parseIgHandle === 'function' ? parseIgHandle(run.partner_ig) : (run.partner_ig ? run.partner_ig.replace('@','').split('?')[0].split('/').filter(Boolean).pop() : null);
                    const igIconSvg = '<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>';
                    // Only show IG icon for the PARTNER (no Stride Rite IG on run cards)
                    const igLink = igHandle
                        ? ' <a href="https://instagram.com/' + igHandle + '" target="_blank" title="@' + igHandle + '" style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:rgba(88,74,220,0.15);border:1px solid rgba(88,74,220,0.3);border-radius:50%;color:var(--neon-accent);vertical-align:middle;margin-left:4px;">' + igIconSvg + '</a>'
                        : '';
                    const isTour = !!run.tour_stop_id;
                    const stopName = run.tour_stop_name || run.location;
                    const topLabel = isTour ? `🎯 TOUR STAGE ${String(run.tour_stop_id).padStart(2,'0')}` : `📍 COMMUNITY RUN`;
                    const mainTitle = isTour ? `Stop ${run.tour_stop_id}: The ${stopName} Run` : run.date_label;
                    const subTitle = isTour 
                        ? `📅 ${run.date_label} <br> 📍 <a href="${run.location_link}" target="_blank" style="color:var(--text-muted);text-decoration:underline;">${run.location}</a>` 
                        : `📍 <a href="${run.location_link}" target="_blank" style="color:var(--text-muted);text-decoration:underline;">${run.location}</a>`;
                        
                    return '<div class="glass-card run-card ' + (isReg?'registered':'') + '">'
                        + (isReg ? '<span class="registered-badge">✓ Registered</span>' : '')
                        + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid rgba(255,255,255,0.05);">'
                        + logoHtml
                        + '<div><div style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;">Hosted By</div>'
                        + '<div style="font-weight:700;color:#fff;">' + (run.partner_name || 'Stride Rite') + ' × Stride Rite' + igLink + '</div></div>'
                        + '</div>'
                        + '<div style="font-family:Outfit;font-weight:800;color:var(--neon-accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:0.8rem;font-size:0.9rem;">' + topLabel + '</div>'
                        + '<div class="run-date" style="font-size:2rem; line-height:1.1; margin-bottom:1rem;">' + mainTitle + '</div>'
                        + '<div class="run-loc" style="line-height:1.6;">' + subTitle + '</div>'
                        + (!isReg
                            ? '<div class="dist-selector" style="margin-top:1rem;">'
                              + ['2K','5K','8K'].map(d => '<button class="dist-btn ' + (dist===d?'active':'') + '" onclick="selectDist(\'' + run.id + '\',\'' + d + '\')">' + d + '</button>').join('')
                              + '</div><button class="btn btn-primary btn-block" onclick="joinRun(\'' + run.id + '\')">Join Mission</button>'
                            : '<button class="btn btn-secondary btn-block" disabled style="background:rgba(34,197,94,0.1);color:#22c55e;border-color:#22c55e;cursor:default;">You\'re Registered ✓</button>')
                        + '</div>';
                }).join('');

                if (runs.length > 0) loadAIAdvisor(runs[0]);
            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="color:#ff4d4d;padding:2rem;">Dashboard connection failed.</p>';
            }
        }

        // ─────────────────────────────────────────────────────────────────
        // Station / Mission Briefing Spotlight
        // ─────────────────────────────────────────────────────────────────
        window.spotlightNextStop = async () => {
            if (!window.lastFetchedRuns) { await initDashboard(); }
            if (!window.lastFetchedRuns || window.lastFetchedRuns.length === 0) {
                Swal.fire({ title: 'No upcoming runs yet!', background:'#141419', color:'#fff' }); return;
            }

            // Prefer next unregistered tour stop, else any tour stop, else first run
            const nextStop =
                window.lastFetchedRuns.find(r => r.tour_stop_id && !window.myRegistrations.includes(r.id)) ||
                window.lastFetchedRuns.find(r => r.tour_stop_id) ||
                window.lastFetchedRuns[0];
            if (!nextStop) return;

            const isReg     = window.myRegistrations.includes(nextStop.id);
            const stopNum   = nextStop.tour_stop_id ? String(nextStop.tour_stop_id).padStart(2,'0') : null;
            const stopName  = nextStop.tour_stop_name || nextStop.location || 'Community Run';
            const dateLabel = (nextStop.date_label || '').split('||')[0];
            const partnerName = nextStop.partner_name || 'Stride Rite';

            const igSvg = '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>';

            const firstN = (user.name||'').split(' ')[0];
            const lastN  = (user.name||'').split(' ').slice(1).join(' ');

            const html = `
<div style="font-family:'Inter',sans-serif; text-align:left; color:#fff; margin:-1rem -1rem -1.5rem; overflow:hidden; border-radius:14px;">

  <!-- STATION HEADER -->
  <div style="background:linear-gradient(160deg,#0f0f1a 0%,#1a1533 100%); padding:1.5rem 1.5rem 1.125rem; border-bottom:1px solid rgba(255,255,255,0.06);">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:1rem; flex-wrap:wrap;">
      <span style="font-size:0.6rem;font-weight:800;letter-spacing:3px;color:var(--neon-accent);text-transform:uppercase;background:rgba(88,74,220,0.1);border:1px solid rgba(88,74,220,0.25);padding:4px 10px;border-radius:20px;">🏅 Tour de Cairo</span>
      ${isReg ? '<span style="font-size:0.6rem;font-weight:800;letter-spacing:2px;color:#22c55e;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);padding:4px 10px;border-radius:20px;">✓ ALREADY REGISTERED</span>' : ''}
    </div>

    ${stopNum ? `
    <div style="display:flex; align-items:center; gap:16px; margin-bottom:0.5rem;">
      <div style="font-family:'Outfit',sans-serif; font-size:3.5rem; font-weight:800; line-height:1; color:rgba(255,255,255,0.06); letter-spacing:-3px; flex-shrink:0; user-select:none;">${stopNum}</div>
      <div>
        <div style="font-size:0.55rem;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:3px;">STOP ${stopNum} / 8</div>
        <div style="font-family:'Outfit',sans-serif; font-size:1.55rem; font-weight:800; color:#fff; line-height:1.1;">${stopName}</div>
      </div>
    </div>
    <div style="margin-bottom:1rem;padding:8px 12px;background:linear-gradient(90deg,rgba(88,74,220,0.12),transparent);border-left:3px solid var(--neon-accent);border-radius:0 6px 6px 0;font-size:0.82rem;color:rgba(255,255,255,0.7);font-style:italic;">
      🔥 This is your chance to add Stop ${stopNum} to your Tour de Cairo legacy. Lock in your spot!
    </div>` : `<div style="font-family:'Outfit',sans-serif; font-size:1.55rem; font-weight:800; color:#fff; margin-bottom:1rem;">${stopName}</div>`}

    <!-- Host branding row -->
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:38px;height:38px;background:rgba(0,0,0,0.4);border-radius:8px;border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;">
        <img src="${nextStop.partner_logo || 'https://via.placeholder.com/36/111/555?text=?'}" style="max-width:34px;max-height:34px;object-fit:contain;">
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:0.6rem;color:rgba(255,255,255,0.35);font-weight:600;letter-spacing:1px;text-transform:uppercase;">Hosted by</div>
        <div style="font-weight:700;color:#fff;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${partnerName} × Stride Rite</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        ${nextStop.partner_ig ? `<a href="https://instagram.com/${parseIgHandle(nextStop.partner_ig)||nextStop.partner_ig.replace('@','')}" target="_blank" title="Partner Instagram" style="width:26px;height:26px;background:rgba(88,74,220,0.12);border:1px solid rgba(88,74,220,0.25);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--neon-accent);text-decoration:none;">${igSvg}</a>` : ''}
      </div>
    </div>
  </div>

  <!-- RUN DETAILS GRID -->
  <div style="background:#0d0d11; padding:1rem 1.5rem; border-bottom:1px solid rgba(255,255,255,0.06);">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
      <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:0.7rem;">
        <div style="font-size:0.55rem;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:3px;">📅 DATE & TIME</div>
        <div style="font-weight:700;color:#fff;font-size:0.9rem;">${dateLabel}</div>
      </div>
      <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:0.7rem;overflow:hidden;">
        <div style="font-size:0.55rem;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:3px;">📍 START POINT</div>
        <div style="font-weight:700;color:#fff;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${nextStop.location || '—'}</div>
      </div>
    </div>
    ${nextStop.location_link ? `
    <a href="${nextStop.location_link}" target="_blank" style="display:flex;align-items:center;gap:8px;background:rgba(88,74,220,0.05);border:1px solid rgba(88,74,220,0.18);border-radius:8px;padding:0.6rem 0.9rem;color:var(--neon-accent);text-decoration:none;font-size:0.82rem;font-weight:600;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      Open Start Location in Google Maps →
    </a>` : ''}
    <div style="margin-top:0.75rem;">
      <div style="font-size:0.55rem;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:6px;">🏃 AVAILABLE DISTANCES</div>
      <div style="display:flex;gap:6px;">
        <span style="background:rgba(88,74,220,0.1);border:1px solid rgba(88,74,220,0.2);color:var(--neon-accent);padding:4px 14px;border-radius:20px;font-size:0.8rem;font-weight:800;">2K</span>
        <span style="background:rgba(88,74,220,0.1);border:1px solid rgba(88,74,220,0.2);color:var(--neon-accent);padding:4px 14px;border-radius:20px;font-size:0.8rem;font-weight:800;">5K</span>
        <span style="background:rgba(88,74,220,0.1);border:1px solid rgba(88,74,220,0.2);color:var(--neon-accent);padding:4px 14px;border-radius:20px;font-size:0.8rem;font-weight:800;">8K</span>
      </div>
    </div>
  </div>

  <!-- SATELLITE MAP -->
  <div style="background:#0d0d11; border-bottom:1px solid rgba(255,255,255,0.06);">
    <div id="spotlight-map" style="width:100%;height:220px;background:#111;"></div>
  </div>

  <!-- REGISTRATION FORM or REGISTERED STATE -->
  <div style="background:#0d0d11; padding:1.25rem 1.5rem 1.5rem;">
    ${isReg ? `
    <div style="text-align:center;padding:1rem;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.18);border-radius:10px;">
      <div style="font-size:1.2rem;margin-bottom:4px;">✅</div>
      <div style="font-weight:700;color:#22c55e;font-size:0.95rem;">You're already registered for this stop!</div>
      <div style="font-size:0.8rem;color:rgba(255,255,255,0.4);margin-top:4px;">See you on race day 🏃</div>
    </div>
    ` : `
    <div style="font-size:0.6rem;font-weight:800;letter-spacing:2px;color:var(--neon-accent);text-transform:uppercase;margin-bottom:0.9rem;">📋 YOUR DETAILS</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
      <input id="reg-firstname" class="reg-input" type="text" placeholder="First Name" value="${firstN}">
      <input id="reg-lastname"  class="reg-input" type="text" placeholder="Last Name"  value="${lastN}">
    </div>
    <input id="reg-phone" class="reg-input" type="tel" placeholder="📞 Phone (e.g. 0100 000 0000)" style="margin-bottom:12px;">
    <div style="font-size:0.6rem;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:8px;">YOUR DISTANCE</div>
    <div style="display:flex;gap:8px;" id="dist-row">
      <button class="dist-opt" data-dist="2K" onclick="selectModalDist(this)">2K</button>
      <button class="dist-opt active" data-dist="5K" onclick="selectModalDist(this)">5K</button>
      <button class="dist-opt" data-dist="8K" onclick="selectModalDist(this)">8K</button>
    </div>
    `}
  </div>

</div>`;

            Swal.fire({
                html,
                width: 640,
                background: '#141419',
                color: '#fff',
                padding: '1.25rem',
                showConfirmButton: !isReg,
                confirmButtonText: '🚀 Lock In My Spot',
                confirmButtonColor: 'var(--neon-accent)',
                showCancelButton: true,
                cancelButtonText: isReg ? 'Close' : 'Cancel',
                preConfirm: () => {
                    if (isReg) return true;
                    const fn    = (document.getElementById('reg-firstname').value || '').trim();
                    const ln    = (document.getElementById('reg-lastname').value  || '').trim();
                    const phone = (document.getElementById('reg-phone').value      || '').trim();
                    const active = document.querySelector('#dist-row .dist-opt.active');
                    const dist  = active ? active.dataset.dist : null;
                    if (!fn || !phone || !dist) {
                        Swal.showValidationMessage('⚠️ Please enter your first name, phone number, and choose a distance.');
                        return false;
                    }
                    return { name: (fn + ' ' + ln).trim(), phone, dist };
                },
                didOpen: () => {
                    const map = L.map('spotlight-map', { zoomControl: true }).setView([30.0444, 31.2357], 13);
                    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);
                    if (nextStop.route_preview_url && nextStop.route_type === 'gpx') {
                        new L.GPX(nextStop.route_preview_url, {
                            async: true,
                            polyline_options: { color: '#ff7300', weight: 4, opacity: 0.9 },
                            marker_options: {
                                startIconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
                                endIconUrl: 'https://cdn-icons-png.flaticon.com/512/61/61041.png',
                                iconSize: [28, 28]
                            }
                        }).on('loaded', e => map.fitBounds(e.target.getBounds(), { padding:[20,20] })).addTo(map);
                    }
                }
            }).then(result => {
                if (result.isConfirmed && !isReg && result.value) {
                    const { name, phone, dist } = result.value;
                    joinRun(nextStop.id, dist, name, phone);
                }
            });
        };

        window.selectModalDist = (btn) => {
            document.querySelectorAll('#dist-row .dist-opt').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };

        window.selectDist = (rId, dist) => { runSelections[rId] = dist; initDashboard(); };

        window.joinRun = async (rId, dist, fullName, phoneNumber) => {
            const finalDist = dist || runSelections[rId] || '5K';
            const finalName = fullName || user.name;
            Swal.fire({ title: 'Locking in your spot...', background:'#141419', didOpen: () => Swal.showLoading() });
            const ok = await AppService.registerForRun(rId, finalDist, user.level || 'Beginner', finalName, phoneNumber);
            if (ok) {
                Swal.fire({ icon:'success', title:'You\'re in!', text:'Mission confirmed. See you there 🏃', background:'#141419', color:'#fff' });
                await initDashboard();
            } else {
                Swal.fire({ icon:'error', title:'Couldn\'t register', text:'You may already be registered, or a connection error occurred.', background:'#141419', color:'#fff' });
            }
        };

        // ─────────────────────────────────────────────────────────────────
        // Weather Banner
        // ─────────────────────────────────────────────────────────────────
        async function loadAIAdvisor(run) {
            try {
                const res  = await fetch('https://api.weatherapi.com/v1/current.json?key=686edc30f7764d08ada12150261604&q=' + encodeURIComponent(run.location));
                const data = await res.json();
                document.getElementById('advisorContainer').innerHTML =
                    '<div class="advisor-card" style="margin-bottom:2rem;">'
                    + '<img src="' + data.current.condition.icon + '" style="width:52px;">'
                    + '<div style="flex:1;"><div style="color:var(--neon-accent);font-weight:800;font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;">🌤 Weather for Next Run</div>'
                    + '<div style="color:white;font-weight:700;margin-top:2px;">' + data.current.temp_c + '°C — ' + data.current.condition.text + '</div></div>'
                    + '</div>';
            } catch (e) { /* silent */ }
        }

        // ─────────────────────────────────────────────────────────────────
        // Animated Tour Overview Map (CartoDB Dark)
        // ─────────────────────────────────────────────────────────────────
        async function initTourMap() {
            const mapEl = document.getElementById('tourMap');
            const tourMap = L.map(mapEl, { zoomControl: false, attributionControl: false }).setView([30.035, 31.4775], 9.7);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(tourMap);
            mapEl.insertAdjacentHTML('afterbegin', '<div class="tour-map-overlay"></div>');

            const stops = await AppService.getTourProgress(user.id);
            if (!stops || stops.length === 0) return;

            const polyline = L.polyline([], { color: '#ff6b35', weight: 2.5, dashArray: '6 8', opacity: 0.8 }).addTo(tourMap);

            async function animateStops() {
                for (let i = 0; i < stops.length; i++) {
                    const s = stops[i];
                    const icon = L.divIcon({
                        html: '<div class="m-wrap" id="mwrap-' + s.id + '"><div class="m-core"></div><div class="m-label">' + String(s.id).padStart(2,'0') + ' \u2014 ' + s.name + '</div></div>',
                        className: ''
                    });
                    L.marker([s.lat, s.lng], { icon }).addTo(tourMap);
                    setTimeout(() => {
                        const el = document.getElementById('mwrap-' + s.id);
                        if (el) el.classList.add('visible');
                    }, 40);
                    polyline.addLatLng([s.lat, s.lng]);
                    await new Promise(r => setTimeout(r, 280));
                }
            }

            const observer = new IntersectionObserver(entries => {
                if (entries[0].isIntersecting) { animateStops(); observer.disconnect(); }
            }, { threshold: 0.1 });
            observer.observe(mapEl);
        }

        function showTourInfo() {
            Swal.fire({
                title: '<span style="font-family:Outfit;color:#fff;">🏅 Tour de Cairo</span>',
                html: '<p style="color:rgba(255,255,255,0.65);text-align:left;line-height:1.7;">Tour de Cairo is Stride Rite\'s flagship 8-stop running series across Cairo\'s most iconic neighbourhoods. Complete every stop to earn your Tour Finisher badge and be celebrated by the community.</p>',
                background:'#141419', color:'#fff', confirmButtonColor:'var(--neon-accent)'
            });
        }
    </script>
</body>
</html>
