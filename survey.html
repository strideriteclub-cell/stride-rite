<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-Run Survey | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=23">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .survey-box { max-width: 600px; margin: 80px auto; padding: 3rem; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 32px; backdrop-filter: blur(20px); }
        .rating-group { display: flex; justify-content: space-between; margin: 2rem 0; }
        .rating-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border-color); background: rgba(255,255,255,0.05); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 800; transition: 0.2s; }
        .rating-btn:hover { border-color: var(--neon-accent); transform: scale(1.1); }
        .rating-btn.active { background: var(--neon-accent); border-color: var(--neon-accent); box-shadow: 0 0 15px var(--neon-glow); }
        textarea { width: 100%; padding: 1rem; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: white; margin-top: 1rem; font-size: 1rem; min-height: 120px; }
    </style>
</head>
<body>
    <div class="survey-box animate-up">
        <h1 style="font-family:'Outfit'; font-size:2rem; margin-bottom:1rem;">How was your run?</h1>
        <p style="color:var(--text-muted);">Tell us how you felt during the <span id="runDateLabel" style="color:var(--peach-accent); font-weight:700;">community run</span>.</p>
        
        <div style="margin-top:2rem;">
            <label style="font-weight:700; color:white;">Rate your effort (1-10):</label>
            <div class="rating-group" id="ratingGroup">
                <button class="rating-btn">1</button>
                <button class="rating-btn">2</button>
                <button class="rating-btn">3</button>
                <button class="rating-btn">4</button>
                <button class="rating-btn" id="defaultRating">5</button>
                <button class="rating-btn">6</button>
                <button class="rating-btn">7</button>
                <button class="rating-btn">8</button>
                <button class="rating-btn">9</button>
                <button class="rating-btn">10</button>
            </div>
        </div>

        <div style="margin-top:2rem;">
            <label style="font-weight:700; color:white;">Any feedback or shoutouts?</label>
            <textarea id="feedbackText" placeholder="Great route! Thanks Haleem for the pacing..."></textarea>
        </div>

        <button onclick="submitSurvey()" class="btn btn-primary btn-block" style="margin-top:2rem;">Submit Feedback</button>
        <br>
        <div style="text-align:center;"><a href="index.html" style="color:var(--text-muted); font-size:0.85rem;">Skip & Go Home</a></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const runDate = urlParams.get('run');
        if (runDate) document.getElementById('runDateLabel').innerText = decodeURIComponent(runDate);

        let selectedRating = 5;
        document.querySelectorAll('.rating-btn').forEach(btn => {
            if(btn.innerText == "5") btn.classList.add('active');
            btn.onclick = () => {
                document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRating = btn.innerText;
            };
        });

        async function submitSurvey() {
            Swal.fire({ title: 'Sending...', background:'#141419', didOpen: () => Swal.showLoading() });
            
            const feedback = document.getElementById('feedbackText').value;
            const botToken = '8682463984:AAHA2PWT7WtQRskETmOanj0k2b45ZgGfYIs';
            const chatId = '1538316434';
            
            const text = `📝 *New Post-Run Feedback*\n\n📅 *Run:* ${runDate || 'Unknown'}\n💪 *Effort:* ${selectedRating}/10\n💬 *Feedback:* ${feedback || '_No text provided_'}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text, parse_mode: 'Markdown' })
                });
                
                Swal.fire({
                    icon: 'success',
                    title: 'Thank you!',
                    text: 'Your feedback helps the community grow.',
                    background: '#141419', color: '#fff'
                }).then(() => window.location.href = 'index.html');
            } catch(e) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Could not send feedback. Try again later.', background:'#141419' });
            }
        }
    </script>
</body>
</html>
