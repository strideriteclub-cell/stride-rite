<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Scanner | Stride Rite Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=22">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        .scanner-container { max-width: 600px; margin: 0 auto; padding: 1rem; margin-top: 80px; }
        .scanner-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; }
        
        /* Speed Tabs */
        .mode-tabs { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 12px; margin-bottom: 1.5rem; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; background: transparent; color: var(--text-muted); font-weight: 800; cursor: pointer; transition: 0.3s; font-family: 'Outfit'; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .mode-btn.active { background: var(--peach-accent); color: white; box-shadow: 0 4px 15px rgba(255, 139, 106, 0.3); }

        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: none !important; transition: height 0.3s; }
        #reader__scan_region { background: #000 !important; }
        
        .manual-section { display: none; text-align: center; padding: 1rem 0; }
        .manual-section.active { display: block; }
        
        .scanner-input { width: 100%; max-width: 300px; background: rgba(255,255,255,0.05); border: 2px solid var(--border-color); padding: 20px; border-radius: 15px; color: white; font-family: 'Outfit'; font-size: 2.5rem; text-align: center; font-weight: 800; margin-bottom: 1.5rem; outline: none; transition: border-color 0.2s; }
        .scanner-input:focus { border-color: var(--peach-accent); background: rgba(255,255,255,0.08); }

        .scan-list { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .scan-list th { text-align: left; padding: 12px; border-bottom: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; }
        .scan-list td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        
        .run-selector { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--neon-accent); padding: 14px; border-radius: 12px; color: white; margin-bottom: 1rem; font-family: 'Outfit'; font-weight: 700; font-size: 1rem; cursor: pointer; }
        
        @media (max-width: 600px) {
            .scanner-container { margin-top: 70px; }
            .scanner-input { font-size: 2rem; padding: 15px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="font-family:'Outfit'; font-weight:800; font-size:1.3rem;">S<span style="color:var(--peach-accent);">.</span> SPEED SCAN</div>
        <div class="nav-links">
            <a href="dashboard.html">📊 Dashboard</a>
            <button onclick="exportToExcel()" class="btn-primary" style="padding: 10px 15px; font-size: 0.8rem;">📥 Excel</button>
        </div>
    </nav>

    <div class="scanner-container animate-up">
        <select id="runSelect" class="run-selector" onchange="loadAttendance()">
            <option value="">Choose a Tour Stop...</option>
        </select>

        <div class="mode-tabs">
            <button id="tab-scan" class="mode-btn active" onclick="setMode('scan')">📸 QR Scan</button>
            <button id="tab-manual" class="mode-btn" onclick="setMode('manual')">⌨️ Manual Bib</button>
        </div>

        <div class="scanner-card">
            <!-- Scan Section -->
            <div id="scan-section">
                <div id="reader"></div>
            </div>

            <!-- Manual Section -->
            <div id="manual-section" class="manual-section">
                <p style="margin-bottom:1rem; font-size:0.8rem; color:var(--text-muted);">Type Bib Number and hit Enter ↵</p>
                <input type="number" id="manualBib" class="scanner-input" placeholder="000" inputmode="numeric">
                <button onclick="checkInByBib()" class="btn btn-primary btn-block" style="padding:1.2rem; font-size:1.1rem;">⚡ CHECK IN</button>
            </div>
        </div>

        <div class="scanner-card" style="padding-top: 1rem;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <h3 style="font-family:'Outfit'; font-size:1rem;">👥 Checked In</h3>
                <span id="scanCount" style="font-size:0.8rem; color:var(--peach-accent); font-weight:800;">0 Runners</span>
            </div>
            <table class="scan-list">
                <thead>
                    <tr>
                        <th>Bib</th>
                        <th>Name</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="attendanceBody"></tbody>
            </table>
        </div>
    </div>

    <script src="app.js?v=22"></script>
    <script>
        const user = AuthService.getCurrentUser();
        if (!user || user.email !== 'tsmhaleem@gmail.com') {
            window.location.href = 'dashboard.html';
        }

        let html5QrCode;
        let attendance = [];
        let currentMode = 'scan';

        async function init() {
            const allRuns = await dbGet('stride_runs', 'order=date_label.desc');
            const select = document.getElementById('runSelect');
            allRuns.forEach(run => {
                const label = run.date_label.split('||')[0].replace('[EXPORTED] ', '');
                const opt = document.createElement('option');
                opt.value = run.id;
                opt.innerText = `${label} - ${run.location}`;
                select.appendChild(opt);
            });

            html5QrCode = new Html5Qrcode("reader");
            startScanner();

            // Easy check-in by Enter key
            document.getElementById('manualBib').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkInByBib();
            });
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tab-scan').classList.toggle('active', mode === 'scan');
            document.getElementById('tab-manual').classList.toggle('active', mode === 'manual');
            
            document.getElementById('scan-section').style.display = (mode === 'scan' ? 'block' : 'none');
            document.getElementById('manual-section').classList.toggle('active', mode === 'manual');

            if (mode === 'manual') {
                stopScanner();
                setTimeout(() => document.getElementById('manualBib').focus(), 100);
            } else {
                startScanner();
            }
        }

        function startScanner() {
            const config = { fps: 15, qrbox: { width: 250, height: 250 } };
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
                .catch(err => console.warn("Scanner start error", err));
        }

        function stopScanner() {
            if (html5QrCode.getState() !== 1) { // 1 = NOT_STARTED
                html5QrCode.stop().catch(err => console.warn("Stop error", err));
            }
        }

        async function onScanSuccess(decodedText) {
            const runId = document.getElementById('runSelect').value;
            if (!runId) {
                Swal.fire('⚠️ Wait!', 'Please select a run first.', 'warning');
                return;
            }
            html5QrCode.pause();
            try {
                const result = await AppService.checkInRunner(runId, decodedText);
                showSuccess(result);
                loadAttendance();
            } catch (e) {
                Swal.fire('❌ Error', e.message, 'error');
            } finally {
                setTimeout(() => html5QrCode.resume(), 1500);
            }
        }

        async function checkInByBib() {
            const runId = document.getElementById('runSelect').value;
            const bib = document.getElementById('manualBib').value;
            if (!runId) { Swal.fire('Select Run', 'Pick a run at the top first.', 'warning'); return; }
            if (!bib) return;

            try {
                const result = await AppService.checkInRunner(runId, parseInt(bib));
                showSuccess(result);
                document.getElementById('manualBib').value = '';
                loadAttendance();
            } catch (e) {
                Swal.fire('❌ Error', e.message, 'error');
            }
        }

        function playSuccessBeep() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const audioCtx = new AudioContext();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime); 
                
                // Fast sharp beep volume profile
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (e) {
                console.error("Beep failed:", e);
            }
        }

        function showSuccess(runner) {
            playSuccessBeep();
            Swal.fire({
                title: '✅ CHECKED IN',
                html: `<div style="padding:1rem;">
                    <div style="font-size:3rem; font-weight:900; color:var(--peach-accent); margin-bottom:0.5rem;">#${runner.bib}</div>
                    <div style="font-size:1.4rem; font-weight:700;">${runner.name}</div>
                </div>`,
                icon: 'success',
                timer: 1200,
                showConfirmButton: false,
                background: '#141419',
                color: '#fff'
            });
        }

        async function loadAttendance() {
            const runId = document.getElementById('runSelect').value;
            if (!runId) return;
            const list = await AppService.getAttendanceList(runId);
            attendance = list;
            const body = document.getElementById('attendanceBody');
            document.getElementById('scanCount').innerText = `${list.length} Runners`;
            body.innerHTML = list.map(r => `
                <tr>
                    <td style="font-weight:900; color:white;">#${r.bib}</td>
                    <td style="font-weight:600;">${r.name}</td>
                    <td style="color:var(--text-muted); font-size:0.75rem;">${r.time}</td>
                </tr>
            `).join('');
        }

        function exportToExcel() {
            if (attendance.length === 0) return;
            const runName = document.getElementById('runSelect').options[document.getElementById('runSelect').selectedIndex].text;
            const ws = XLSX.utils.json_to_sheet(attendance);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, `Attendance_${runName.replace(/[^a-z0-9]/gi, '_')}.xlsx`);
        }

        init();
    </script>
</body>
</html>
