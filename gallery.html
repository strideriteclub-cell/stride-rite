<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Gallery | Stride Rite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=15">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .custom-logo-container { display: flex; align-items: center; gap: 12px; }
        .custom-logo { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; color: #fff; position: relative; }
        .custom-logo .dot { position: absolute; top: 3px; right: -6px; width: 6px; height: 6px; background-color: var(--peach-accent); border-radius: 50%; }
        .gallery-grid { columns: 3 280px; column-gap: 1.25rem; width: 100%; margin-top: 2rem; }
        .gallery-item { break-inside: avoid; margin-bottom: 1.25rem; border-radius: 16px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid var(--border-color); }
        .gallery-item img { width: 100%; display: block; }
        .filter-bar { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:2rem; }
        .filter-btn { padding:0.5rem 1.2rem; border-radius:50px; background:transparent; border:1px solid var(--border-color); color:var(--text-muted); cursor:pointer; }
        .filter-btn.active { background:var(--neon-accent); border-color:var(--neon-accent); color:white; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="custom-logo-container">
            <div class="custom-logo">S<span class="dot"></span></div>
            <div style="font-family:'Outfit'; font-weight:800; font-size:1.1rem; margin-left:12px;">STRIDE RITE</div>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">📊 Board</a>
            <a href="index.html">🏠 Home</a>
            <a href="#" onclick="AuthService.logout()">Logout</a>
        </div>
    </nav>

    <div class="main-container animate-up">
        <h1 style="font-size:2.2rem; margin-bottom:0.5rem;">📸 Run Memories</h1>
        <p style="color:var(--text-muted); margin-bottom:2rem;">Photos from our community runs</p>

        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" onclick="filterGallery('all', this)">All Runs</button>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <div style="text-align:center; padding:4rem; color:var(--text-muted);">Loading photos...</div>
        </div>
    </div>

    <script src="app.js?v=21"></script>
    <script>
        const SUPABASE_URL_G = 'https://qcqyyfnsfyuaaaacddsm.supabase.co';
        const SUPABASE_KEY_G = 'sb_publishable_uXs2e5aPzrIL_M2xsYDmWg_hPOUaG1l';
        const headers = { 'apikey': SUPABASE_KEY_G, 'Authorization': `Bearer ${SUPABASE_KEY_G}`, 'Content-Type': 'application/json' };

        async function loadGallery() {
            const res = await fetch(`${SUPABASE_URL_G}/rest/v1/gallery_photos?select=*`, { headers });
            const photos = await res.json();
            const grid = document.getElementById('galleryGrid');
            if(!photos || photos.length === 0) {
                grid.innerHTML = `<p style="padding:4rem; text-align:center; color:var(--text-muted);">No memories uploaded yet.</p>`;
                return;
            }
            grid.innerHTML = photos.map(p => `<div class="gallery-item"><img src="${p.photo_url}" loading="lazy"></div>`).join('');
        }
        loadGallery();
    </script>
</body>
</html>
